<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Project — GT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app.css">
  <script src="/me.js"></script>
  <style>
    .form-head h2 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(1.375rem, 2.5vw, 1.75rem);
      letter-spacing: -0.02em;
      margin: 0 0 0.5rem;
    }
    .form-head p.lede { margin-bottom: var(--space-lg); }

    /* Cover photo dropzone preview */
    .cover-dropzone {
      border: 1px dashed var(--line-strong);
      background: var(--bg-elevated);
      padding: var(--space-md);
      text-align: center;
      cursor: pointer;
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: border-color var(--transition), background var(--transition);
    }
    .cover-dropzone:hover, .cover-dropzone.drag-over {
      border-color: var(--accent);
      background: var(--warning-bg);
    }
    .cover-dropzone p { color: var(--ink-muted); font-size: 0.9375rem; margin: 0; }
    .cover-dropzone strong { color: var(--accent); font-weight: 600; }

    .cover-preview { display: none; max-width: 100%; max-height: 220px; object-fit: cover; }
    .cover-preview.visible { display: block; }
    .cover-meta { display: none; font-size: 0.75rem; color: var(--ink-subtle); margin-top: 6px; }
    .cover-meta.visible { display: block; }
    #coverInput { display: none; }

    .levels-preview {
      background: var(--bg-elevated);
      border: 1px solid var(--line);
      padding: var(--space-md);
      margin-bottom: var(--space-lg);
    }
    .levels-chips {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .level-chip {
      background: var(--bg);
      border: 1px solid var(--line-strong);
      color: var(--ink-muted);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 4px 10px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/">
        <img class="logo__mark" src="https://gt3d.com/images/logo-mark.svg" alt="" width="36" height="36" decoding="async">
        Ground Truth <span>3D</span>
      </a>
      <nav class="nav-primary" aria-label="Primary">
        <a href="/">Projects</a>
        <a href="/new-project.html" class="is-active">New Project</a>
      </nav>
    </div>
  </header>

  <main class="container-sm">
    <div class="form-head">
      <p class="eyebrow">Setup</p>
      <h2>Create a new project</h2>
      <p class="lede">Sets up project folders and default levels. You can add 360 photos and 2D images after.</p>
    </div>

    <form id="projectForm">
      <div class="field">
        <label class="field-label" for="projectName">Project Name <span class="required-mark">*</span></label>
        <input class="field-input" type="text" id="projectName" required placeholder="e.g. 123 Main Street">
      </div>

      <div class="field">
        <label class="field-label" for="projectAddress">Project Address</label>
        <input class="field-input" type="text" id="projectAddress" placeholder="Full address">
      </div>

      <div class="field">
        <label class="field-label">Cover Photo (optional)</label>
        <div class="cover-dropzone" id="coverDropzone">
          <div id="coverPrompt">
            <p>Drag & drop an image here, or <strong>browse</strong></p>
          </div>
          <img class="cover-preview" id="coverPreview" alt="">
        </div>
        <div class="cover-meta" id="coverMeta"></div>
        <input type="file" id="coverInput" accept="image/*">
      </div>

      <div class="levels-preview">
        <div class="field-label" style="margin-bottom: 0.75rem;">Default Levels (will be created)</div>
        <div class="levels-chips">
          <span class="level-chip">level 0</span>
          <span class="level-chip">level 1</span>
          <span class="level-chip">level 2</span>
          <span class="level-chip">level 3</span>
          <span class="level-chip">attic</span>
          <span class="level-chip">garage</span>
          <span class="level-chip">exterior</span>
        </div>
      </div>

      <div style="display:flex; gap: var(--space-sm);">
        <a href="/" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn" style="flex:1;">Create Project</button>
      </div>
      <div class="status-message" id="statusMessage"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById("projectForm");
    const nameEl = document.getElementById("projectName");
    const addressEl = document.getElementById("projectAddress");
    const dropzone = document.getElementById("coverDropzone");
    const coverInput = document.getElementById("coverInput");
    const coverPrompt = document.getElementById("coverPrompt");
    const coverPreview = document.getElementById("coverPreview");
    const coverMeta = document.getElementById("coverMeta");
    const submitBtn = document.getElementById("submitBtn");
    const statusMessage = document.getElementById("statusMessage");

    let coverFile = null;

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(2) + " MB";
    }

    function setCover(file) {
      if (!file.type.startsWith("image/")) return;
      coverFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        coverPreview.src = e.target.result;
        coverPreview.classList.add("visible");
        coverPrompt.style.display = "none";
      };
      reader.readAsDataURL(file);
      coverMeta.textContent = `${file.name} (${formatSize(file.size)}) — click or drop to replace`;
      coverMeta.classList.add("visible");
    }

    dropzone.addEventListener("click", () => coverInput.click());
    dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("drag-over"); });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag-over"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("drag-over");
      if (e.dataTransfer.files.length > 0) setCover(e.dataTransfer.files[0]);
    });
    coverInput.addEventListener("change", () => {
      if (coverInput.files.length > 0) setCover(coverInput.files[0]);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = nameEl.value.trim();
      if (!name) { nameEl.focus(); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = "Creating project…";
      statusMessage.textContent = "Creating folders, levels, and uploading cover photo…";
      statusMessage.className = "status-message visible info";

      try {
        const formData = new FormData();
        formData.append("name", name);
        formData.append("address", addressEl.value.trim());
        if (coverFile) formData.append("coverPhoto", coverFile);

        const res = await fetch("/api/create-project", { method: "POST", body: formData });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || "Failed to create project");

        window.location.href = "/";
      } catch (err) {
        statusMessage.textContent = "Error: " + err.message;
        statusMessage.className = "status-message visible error";
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Project";
      }
    });
  </script>
</body>
</html>
