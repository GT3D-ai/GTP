<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Project</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }

    .top-bar h1 { font-size: 1.1rem; font-weight: 600; color: #f0f3f6; }
    .top-bar a { color: #58a6ff; text-decoration: none; font-size: 0.85rem; }
    .top-bar a:hover { text-decoration: underline; }

    .container { max-width: 560px; margin: 0 auto; padding: 32px 24px; }

    h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; color: #f0f3f6; }
    .subtitle { color: #8b949e; font-size: 0.9rem; margin-bottom: 28px; }

    .field { margin-bottom: 20px; }

    label.field-label {
      display: block;
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 6px;
    }

    .field-input {
      width: 100%;
      padding: 10px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e1e4e8;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field-input:focus { border-color: #58a6ff; }

    .cover-dropzone {
      border: 2px dashed #30363d;
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      background: #161b22;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover-dropzone:hover, .cover-dropzone.drag-over {
      border-color: #58a6ff;
      background: #1c2333;
    }

    .cover-dropzone p { color: #8b949e; font-size: 0.9rem; }
    .cover-dropzone p strong { color: #58a6ff; }

    .cover-preview {
      display: none;
      max-width: 100%;
      max-height: 200px;
      border-radius: 6px;
      object-fit: cover;
    }

    .cover-preview.visible { display: block; }

    .cover-meta {
      display: none;
      font-size: 0.75rem;
      color: #8b949e;
      margin-top: 8px;
    }

    .cover-meta.visible { display: block; }

    #coverInput { display: none; }

    .levels-preview {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 24px;
    }

    .levels-preview-label {
      font-size: 0.75rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .levels-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .level-chip {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e1e4e8;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 12px;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover { background: #2ea043; }
    .submit-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    .status-message {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .status-message.visible { display: block; }
    .status-message.error { background: #2d1117; color: #f85149; border: 1px solid #da3633; }
    .status-message.info { background: #0d2033; color: #58a6ff; border: 1px solid #1f6feb; }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>New Project</h1>
    <a href="/">&larr; Back to Projects</a>
  </div>

  <div class="container">
    <h2>Create a New Project</h2>
    <p class="subtitle">Set up a new project with default levels. You can add 360 photos and 2D images after.</p>

    <form id="projectForm">
      <div class="field">
        <label class="field-label" for="projectName">Project Name <span style="color:#f85149">*</span></label>
        <input class="field-input" type="text" id="projectName" required placeholder="e.g. 123 Main Street">
      </div>

      <div class="field">
        <label class="field-label" for="projectAddress">Project Address</label>
        <input class="field-input" type="text" id="projectAddress" placeholder="Full address">
      </div>

      <div class="field">
        <label class="field-label">Cover Photo (optional)</label>
        <div class="cover-dropzone" id="coverDropzone">
          <div id="coverPrompt">
            <p>Drag & drop an image here, or <strong>browse</strong></p>
          </div>
          <img class="cover-preview" id="coverPreview" alt="Cover preview">
        </div>
        <div class="cover-meta" id="coverMeta"></div>
        <input type="file" id="coverInput" accept="image/*">
      </div>

      <div class="levels-preview">
        <div class="levels-preview-label">Default Levels (will be created)</div>
        <div class="levels-chips">
          <span class="level-chip">level 0</span>
          <span class="level-chip">level 1</span>
          <span class="level-chip">level 2</span>
          <span class="level-chip">level 3</span>
          <span class="level-chip">attic</span>
          <span class="level-chip">garage</span>
          <span class="level-chip">exterior</span>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Create Project</button>
      <div class="status-message" id="statusMessage"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById("projectForm");
    const nameEl = document.getElementById("projectName");
    const addressEl = document.getElementById("projectAddress");
    const dropzone = document.getElementById("coverDropzone");
    const coverInput = document.getElementById("coverInput");
    const coverPrompt = document.getElementById("coverPrompt");
    const coverPreview = document.getElementById("coverPreview");
    const coverMeta = document.getElementById("coverMeta");
    const submitBtn = document.getElementById("submitBtn");
    const statusMessage = document.getElementById("statusMessage");

    let coverFile = null;

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(2) + " MB";
    }

    function setCover(file) {
      if (!file.type.startsWith("image/")) return;
      coverFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        coverPreview.src = e.target.result;
        coverPreview.classList.add("visible");
        coverPrompt.style.display = "none";
      };
      reader.readAsDataURL(file);
      coverMeta.textContent = `${file.name} (${formatSize(file.size)}) — click or drop to replace`;
      coverMeta.classList.add("visible");
    }

    dropzone.addEventListener("click", () => coverInput.click());
    dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("drag-over"); });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag-over"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("drag-over");
      if (e.dataTransfer.files.length > 0) setCover(e.dataTransfer.files[0]);
    });
    coverInput.addEventListener("change", () => {
      if (coverInput.files.length > 0) setCover(coverInput.files[0]);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = nameEl.value.trim();
      if (!name) {
        nameEl.focus();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Creating project...";
      statusMessage.textContent = "Creating project folders, levels, and uploading cover photo...";
      statusMessage.className = "status-message visible info";

      try {
        const formData = new FormData();
        formData.append("name", name);
        formData.append("address", addressEl.value.trim());
        if (coverFile) formData.append("coverPhoto", coverFile);

        const res = await fetch("/api/create-project", {
          method: "POST",
          body: formData,
        });

        const data = await res.json();
        if (!res.ok || !data.success) {
          throw new Error(data.error || "Failed to create project");
        }

        // Navigate to projects page
        window.location.href = "/";
      } catch (err) {
        statusMessage.textContent = "Error: " + err.message;
        statusMessage.className = "status-message visible error";
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Project";
      }
    });
  </script>
</body>
</html>
