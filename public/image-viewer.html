<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Image Viewer — GT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app.css">
  <script src="/me.js"></script>
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .main { display: flex; flex: 1; min-height: 0; }

    .sidebar {
      width: 300px;
      background: var(--bg-elevated);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 0.875rem var(--space-sm);
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--line);
    }

    .file-list { flex: 1; overflow-y: auto; }

    .file-item {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.625rem var(--space-sm);
      cursor: pointer;
      transition: background var(--transition);
      border-bottom: 1px solid var(--line);
    }
    .file-item:hover { background: var(--bg); }
    .file-item.active {
      background: var(--warning-bg);
      border-left: 2px solid var(--accent);
      padding-left: calc(var(--space-sm) - 2px);
    }
    .file-item-thumb {
      width: 44px; height: 44px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--line);
      border: 1px solid var(--line);
    }
    .file-item-info { flex: 1; min-width: 0; }
    .file-item-name { font-size: 0.8125rem; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-item-meta { font-size: 0.7rem; color: var(--ink-subtle); margin-top: 2px; }

    .delete-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--ink-subtle);
      padding: 3px 8px;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      transition: all var(--transition);
    }
    .delete-btn:hover { color: var(--danger); border-color: var(--danger); }

    .visibility-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--ink-subtle);
      padding: 3px 6px;
      cursor: pointer;
      font-size: 0.95rem;
      line-height: 1;
      transition: all var(--transition);
    }
    .visibility-btn:hover { color: var(--ink); border-color: var(--line-strong); }
    .file-item.is-hidden { opacity: 0.55; }
    .file-item.is-hidden .file-item-name::after {
      content: " · hidden";
      color: var(--ink-subtle);
      font-weight: 400;
      font-style: italic;
    }

    .viewer-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: var(--secondary-block);
    }
    .viewer-area img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }
    .viewer-area img.visible { display: block; }

    .placeholder { text-align: center; color: rgba(255,255,255,0.45); padding: var(--space-md); }
    .placeholder-icon { font-size: 2.5rem; margin-bottom: var(--space-sm); }
    .placeholder p { font-size: 0.9rem; margin: 0; }

    .loading-overlay {
      position: absolute; inset: 0;
      background: rgba(42, 47, 54, 0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      color: rgba(255,255,255,0.8);
      font-size: 0.875rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .loading-overlay.hidden { display: none; }

    .image-info-bar {
      display: none;
      padding: 0.5rem var(--space-md);
      background: var(--bg-elevated);
      border-top: 1px solid var(--line);
      font-size: 0.75rem;
      color: var(--ink-muted);
      flex-shrink: 0;
    }
    .image-info-bar.visible { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .image-info-bar span:first-child { color: var(--ink); font-weight: 600; }

    /* Mobile: drop the right-hand viewer, turn the file list into a card
       grid, and open a full-screen modal when a card is tapped. */
    @media (max-width: 720px) {
      body { overflow: auto; height: auto; min-height: 100vh; }
      .main { flex-direction: column; flex: 0 0 auto; }
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--line);
      }
      .sidebar-header { padding: 0.875rem var(--space-md); }
      .viewer-area, .image-info-bar { display: none !important; }

      .file-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 1px;
        background: var(--line);
        border-top: 1px solid var(--line);
      }
      .file-item {
        display: flex;
        flex-direction: column;
        padding: 0;
        border-bottom: none;
        gap: 0;
        background: var(--bg-elevated);
      }
      .file-item:hover { background: var(--bg); }
      .file-item.active { background: var(--bg-elevated); border-left: none; padding-left: 0; }
      .file-item-thumb { width: 100%; height: auto; aspect-ratio: 4/3; border: none; }
      .file-item-info { padding: 8px 10px; width: 100%; min-width: 0; }
      .delete-btn {
        position: absolute;
        top: 6px; right: 6px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid var(--line);
      }
      .file-item { position: relative; }
    }

    /* Full-screen modal (any viewport) */
    .fs-modal {
      position: fixed;
      inset: 0;
      background: var(--ink);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .fs-modal.visible { display: flex; }
    .fs-modal img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-touch-callout: none;
    }
    .fs-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.25);
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 1010;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }
    .fs-close:hover { background: var(--accent); border-color: var(--accent); }
    .fs-title {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #fff;
      font-size: 0.8125rem;
      letter-spacing: 0.04em;
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 12px;
      z-index: 1010;
      max-width: calc(100% - 100px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/">
        <img class="logo__mark" src="https://gt3d.com/images/logo-mark.svg" alt="" width="36" height="36" decoding="async">
        Ground Truth <span>3D</span>
      </a>
      <nav class="nav-primary" aria-label="Primary">
        <a id="projectHomeLink" href="/">Project Home</a>
        <a id="mapEditorLink" href="/map-editor.html">Map Editor</a>
        <a id="viewerLink" href="/viewer.html">360 Images</a>
        <a id="imagesLink" href="#" class="is-active">2D Images</a>
        <a id="modelsLink" href="/models/">Models</a>
      </nav>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-header" id="sidebarHeader">Images</div>
      <div class="file-list" id="fileList">
        <div class="placeholder" style="color:var(--ink-subtle); padding: var(--space-md);">
          <p>Loading…</p>
        </div>
      </div>
    </aside>

    <div class="viewer-area" id="viewerArea">
      <div class="placeholder" id="viewerPlaceholder">
        <div class="placeholder-icon">&#128444;</div>
        <p>Select an image to view</p>
      </div>
      <img id="viewerImage" alt="">
      <div class="loading-overlay hidden" id="loadingOverlay">Loading image…</div>
    </div>
  </div>

  <div class="image-info-bar" id="imageInfoBar">
    <span id="infoName"></span>
    <span id="infoDimensions"></span>
    <span id="infoSize"></span>
  </div>

  <!-- Full-screen modal (used on mobile and when opening from the sidebar on narrow screens) -->
  <div class="fs-modal" id="fsModal" role="dialog" aria-modal="true">
    <div class="fs-title" id="fsTitle"></div>
    <button class="fs-close" id="fsClose" aria-label="Close">&times;</button>
    <img id="fsImg" alt="">
  </div>

  <script>
    const fileList = document.getElementById("fileList");
    const viewerPlaceholder = document.getElementById("viewerPlaceholder");
    const viewerImage = document.getElementById("viewerImage");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const imageInfoBar = document.getElementById("imageInfoBar");

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(2) + " MB";
    }

    const params = new URLSearchParams(window.location.search);
    const project = params.get("project");

    if (project) {
      document.getElementById("sidebarHeader").textContent = `Images — ${project}`;
      const enc = encodeURIComponent(project);
      document.getElementById("projectHomeLink").href = `/${enc}`;
      document.getElementById("mapEditorLink").href = `/map-editor.html?project=${enc}`;
      document.getElementById("viewerLink").href = `/viewer.html?project=${enc}`;
      document.getElementById("modelsLink").href = `/models/${enc}`;
    }

    let isAdminUser = false;

    async function loadFiles() {
      try {
        // Admins hit the admin listing so they see hidden items; non-admins
        // get the public-filtered list.
        isAdminUser = !!(window.me && await window.me.isAdmin());
        const base = isAdminUser ? "/api/admin/2d/files" : "/api/2d/files";
        let url = base;
        if (project) url += `?project=${encodeURIComponent(project)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("Failed to load files");
        const files = await res.json();

        if (files.length === 0) {
          fileList.innerHTML = '<div class="placeholder" style="padding:var(--space-md); color:var(--ink-subtle);"><p>No images in this project</p></div>';
          return;
        }

        fileList.innerHTML = "";
        files.forEach((file) => {
          const thumbBase = isAdminUser ? "/api/admin/2d/image" : "/api/2d/image";
          const thumbUrl = `${thumbBase}?file=${encodeURIComponent(file.name)}`;
          const item = document.createElement("div");
          item.className = "file-item";
          if (file.hidden) item.classList.add("is-hidden");
          const visibilityBtn = isAdminUser
            ? `<button class="visibility-btn" title="${file.hidden ? "Show to non-admins" : "Hide from non-admins"}">${file.hidden ? "&#128065;" : "&#128683;"}</button>`
            : "";
          item.innerHTML = `
            <img class="file-item-thumb" src="${thumbUrl}" alt="${file.displayName}" loading="lazy">
            <div class="file-item-info">
              <div class="file-item-name" title="${file.displayName}">${file.displayName}</div>
              <div class="file-item-meta">${formatSize(file.size)}</div>
            </div>
            ${visibilityBtn}
            <button class="delete-btn" title="Delete image">&times;</button>
          `;
          item.addEventListener("click", (e) => {
            if (e.target.closest(".delete-btn") || e.target.closest(".visibility-btn")) return;
            showImage(file, item);
          });
          item.querySelector(".delete-btn").addEventListener("click", (e) => {
            e.stopPropagation();
            deleteImage(file);
          });
          const visEl = item.querySelector(".visibility-btn");
          if (visEl) {
            visEl.addEventListener("click", (e) => {
              e.stopPropagation();
              toggleVisibility(file);
            });
          }
          fileList.appendChild(item);
        });
      } catch (err) {
        fileList.innerHTML = `<div class="placeholder" style="color:var(--danger); padding:var(--space-md);"><p>${err.message}</p></div>`;
      }
    }

    async function toggleVisibility(file) {
      try {
        const res = await fetch("/api/admin/2d/visibility", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ file: file.name, hidden: !file.hidden }),
        });
        if (!res.ok) throw new Error("Failed to update visibility");
        loadFiles();
      } catch (err) {
        alert("Error: " + err.message);
      }
    }

    let currentFile = null;

    async function deleteImage(file) {
      if (!confirm(`Delete "${file.displayName}"?`)) return;
      try {
        const res = await fetch("/api/2d/delete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ file: file.name }),
        });
        if (!res.ok) throw new Error("Delete failed");
        if (currentFile && currentFile.name === file.name) {
          viewerImage.classList.remove("visible");
          viewerPlaceholder.innerHTML = '<div class="placeholder-icon">&#128444;</div><p>Select an image to view</p>';
          viewerPlaceholder.style.display = "";
          imageInfoBar.classList.remove("visible");
          currentFile = null;
        }
        loadFiles();
      } catch (err) {
        alert("Error deleting image: " + err.message);
      }
    }

    const mobileMq = window.matchMedia("(max-width: 720px)");

    function showImage(file, itemEl) {
      currentFile = file;
      document.querySelectorAll(".file-item.active").forEach((el) => el.classList.remove("active"));
      itemEl.classList.add("active");

      if (mobileMq.matches) {
        openFullscreen(file);
        return;
      }

      viewerPlaceholder.style.display = "none";
      viewerImage.classList.remove("visible");
      loadingOverlay.classList.remove("hidden");

      const url = `/api/2d/image?file=${encodeURIComponent(file.name)}`;
      viewerImage.onload = () => {
        loadingOverlay.classList.add("hidden");
        viewerImage.classList.add("visible");
        document.getElementById("infoName").textContent = file.displayName;
        document.getElementById("infoDimensions").textContent = `${viewerImage.naturalWidth} × ${viewerImage.naturalHeight}`;
        document.getElementById("infoSize").textContent = formatSize(file.size);
        imageInfoBar.classList.add("visible");
      };
      viewerImage.onerror = () => {
        loadingOverlay.classList.add("hidden");
        viewerPlaceholder.innerHTML = `<div class="placeholder-icon">&#128444;</div><p style="color:#ff8a7a">Failed to load image</p>`;
        viewerPlaceholder.style.display = "";
        imageInfoBar.classList.remove("visible");
      };
      viewerImage.src = url;
    }

    // Full-screen modal
    const fsModal = document.getElementById("fsModal");
    const fsImg = document.getElementById("fsImg");
    const fsTitle = document.getElementById("fsTitle");
    const fsClose = document.getElementById("fsClose");

    function openFullscreen(file) {
      fsTitle.textContent = file.displayName;
      fsImg.src = `/api/2d/image?file=${encodeURIComponent(file.name)}`;
      fsModal.classList.add("visible");
      document.body.style.overflow = "hidden"; // lock background scroll while modal open
    }
    function closeFullscreen() {
      fsModal.classList.remove("visible");
      fsImg.src = "";
      document.body.style.overflow = "";
    }
    fsClose.addEventListener("click", closeFullscreen);
    fsModal.addEventListener("click", (e) => {
      if (e.target === fsModal) closeFullscreen();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && fsModal.classList.contains("visible")) closeFullscreen();
    });

    loadFiles();
  </script>
</body>
</html>
