name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  SERVICE: gt-platform
  RUNTIME_SA: ${{ vars.GCP_RUNTIME_SA }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # needed for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        env:
          SENDGRID_FROM_EMAIL: ${{ vars.SENDGRID_FROM_EMAIL }}
          SENDGRID_FROM_NAME: ${{ vars.SENDGRID_FROM_NAME }}
          SENDGRID_SECRET_NAME: ${{ vars.SENDGRID_SECRET_NAME }}
        run: |
          # SendGrid wiring is opt-in: only mount the secret + env vars when
          # vars.SENDGRID_FROM_EMAIL and vars.SENDGRID_SECRET_NAME are set in
          # the GitHub repo (or environment). The secret must already exist in
          # GCP Secret Manager and the runtime SA must have secretAccessor.
          # Use a bash array so values containing spaces (e.g. "Ground Truth 3D")
          # are preserved as single args instead of being word-split.
          EXTRA_ARGS=()
          if [ -n "$SENDGRID_FROM_EMAIL" ] && [ -n "$SENDGRID_SECRET_NAME" ]; then
            EXTRA_ARGS+=("--update-secrets=SENDGRID_API_KEY=${SENDGRID_SECRET_NAME}:latest")
            EXTRA_ARGS+=("--update-env-vars=SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}")
            EXTRA_ARGS+=("--update-env-vars=SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME:-Ground Truth 3D}")
          fi
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --max-instances 10 \
            --no-use-http2 \
            --ingress=internal-and-cloud-load-balancing \
            --service-account "$RUNTIME_SA" \
            "${EXTRA_ARGS[@]}" \
            --quiet

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe "$SERVICE" --region "$REGION" --format 'value(status.url)')
          echo "Deployed: $URL"
          echo "::notice title=Deployed URL::$URL"
