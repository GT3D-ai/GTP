<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }

    .top-bar h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f0f3f6;
    }

    .top-bar a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.85rem;
    }

    .top-bar a:hover { text-decoration: underline; }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    @media (max-width: 600px) {
      .project-grid {
        grid-template-columns: 1fr;
      }
      .container { padding: 20px 16px; }
      .top-bar { padding: 10px 16px; }
    }

    .project-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
      color: #e1e4e8;
      display: block;
      overflow: hidden;
    }

    .project-card-cover {
      width: 100%;
      height: 120px;
      object-fit: cover;
      display: block;
      background: #21262d;
    }

    .project-card-cover-placeholder {
      width: 100%;
      height: 120px;
      background: #21262d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #30363d;
    }

    .project-card-body {
      padding: 14px 16px;
    }

    .project-card-address {
      font-size: 0.75rem;
      color: #8b949e;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .new-project-btn {
      display: inline-block;
      padding: 8px 16px;
      background: #238636;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .new-project-btn:hover { background: #2ea043; text-decoration: none; }

    .project-card:hover {
      border-color: #58a6ff;
      background: #1c2333;
    }

    .project-card-icon {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .project-card-name {
      font-size: 0.95rem;
      font-weight: 600;
      word-break: break-word;
    }

    .placeholder {
      text-align: center;
      color: #484f58;
      padding: 48px 24px;
    }

    .placeholder-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .placeholder p {
      font-size: 0.95rem;
    }

    .error-msg {
      color: #f85149;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>Projects</h1>
    <div style="display:flex; gap:16px; align-items:center;">
      <a href="/new-project.html" class="new-project-btn">+ New Project</a>
    </div>
  </div>

  <div class="container">
    <div id="projectList">
      <div class="placeholder">
        <p>Loading projects...</p>
      </div>
    </div>
  </div>

  <script>
    const projectList = document.getElementById("projectList");

    async function loadProjects() {
      try {
        const res = await fetch("/api/projects");
        if (!res.ok) throw new Error("Failed to load projects");
        const projects = await res.json();

        if (projects.length === 0) {
          projectList.innerHTML = '<div class="placeholder"><div class="placeholder-icon">&#128194;</div><p>No projects yet. Click <a href="/new-project.html" style="color:#58a6ff">+ New Project</a> to create one.</p></div>';
          return;
        }

        const grid = document.createElement("div");
        grid.className = "project-grid";

        // Fetch metadata + optional fallback cover for each project in parallel
        const infos = await Promise.all(projects.map(async (name) => {
          let info = { name, address: null, coverPhoto: null };
          try {
            const r = await fetch(`/api/project-info?project=${encodeURIComponent(name)}`);
            if (r.ok) info = await r.json();
          } catch {}

          // Fallback: if no explicit cover photo, use the first 2D image in the project
          if (!info.coverPhoto) {
            try {
              const r2 = await fetch(`/api/2d/files?project=${encodeURIComponent(name)}`);
              if (r2.ok) {
                const files = await r2.json();
                const firstImage = files.find((f) => (f.contentType || "").startsWith("image/"));
                if (firstImage) info.coverPhoto = firstImage.name;
              }
            } catch {}
          }
          return info;
        }));

        infos.forEach((info) => {
          const name = info.name;
          const coverHtml = info.coverPhoto
            ? `<img class="project-card-cover" src="/api/2d/image?file=${encodeURIComponent(info.coverPhoto)}" alt="${name}" loading="lazy" onerror="this.outerHTML='&lt;div class=&quot;project-card-cover-placeholder&quot;&gt;&amp;#128194;&lt;/div&gt;'">`
            : `<div class="project-card-cover-placeholder">&#128194;</div>`;

          const addressHtml = info.address
            ? `<div class="project-card-address" title="${info.address}">${info.address}</div>`
            : "";

          const card = document.createElement("div");
          card.className = "project-card";
          card.innerHTML = `
            ${coverHtml}
            <div class="project-card-body">
              <div class="project-card-name">${name}</div>
              ${addressHtml}
              <div style="display:flex; gap:12px; margin-top:10px; font-size:0.8rem; flex-wrap:wrap;">
                <a href="/viewer.html?project=${encodeURIComponent(name)}" style="color:#58a6ff; text-decoration:none;">360 Photos</a>
                <a href="/image-viewer.html?project=${encodeURIComponent(name)}" style="color:#58a6ff; text-decoration:none;">2D Images</a>
                <a href="/map-viewer/${encodeURIComponent(name)}" style="color:#58a6ff; text-decoration:none;">View Map</a>
                <a href="/map-editor.html?project=${encodeURIComponent(name)}" style="color:#58a6ff; text-decoration:none;">Edit Map</a>
                <a href="/edit-project.html?project=${encodeURIComponent(name)}" style="color:#8b949e; text-decoration:none; margin-left:auto;">Edit</a>
              </div>
            </div>
          `;
          card.style.cursor = "pointer";
          card.title = "Open map";
          card.addEventListener("click", (e) => {
            // If the user clicked an existing link or a child of one, let it handle navigation
            if (e.target.closest("a[href]")) return;
            window.location.href = `/map-viewer/${encodeURIComponent(name)}`;
          });
          grid.appendChild(card);
        });

        projectList.innerHTML = "";
        projectList.appendChild(grid);
      } catch (err) {
        projectList.innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    loadProjects();
  </script>
</body>
</html>
