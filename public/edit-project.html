<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Project</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }

    .top-bar h1 { font-size: 1.1rem; font-weight: 600; color: #f0f3f6; }
    .top-bar a { color: #58a6ff; text-decoration: none; font-size: 0.85rem; }
    .top-bar a:hover { text-decoration: underline; }

    .container { max-width: 560px; margin: 0 auto; padding: 32px 24px; }

    h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; color: #f0f3f6; }
    .subtitle { color: #8b949e; font-size: 0.9rem; margin-bottom: 28px; }

    .field { margin-bottom: 20px; }

    label.field-label {
      display: block;
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 6px;
    }

    .field-input {
      width: 100%;
      padding: 10px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e1e4e8;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field-input:focus { border-color: #58a6ff; }
    .field-input[readonly] { opacity: 0.7; cursor: not-allowed; background: #161b22; }

    .field-hint { font-size: 0.72rem; color: #484f58; margin-top: 4px; }

    .cover-dropzone {
      border: 2px dashed #30363d;
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      background: #161b22;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover-dropzone:hover, .cover-dropzone.drag-over {
      border-color: #58a6ff;
      background: #1c2333;
    }

    .cover-dropzone p { color: #8b949e; font-size: 0.9rem; }
    .cover-dropzone p strong { color: #58a6ff; }

    .cover-preview {
      display: none;
      max-width: 100%;
      max-height: 220px;
      border-radius: 6px;
      object-fit: cover;
    }

    .cover-preview.visible { display: block; }

    .cover-meta {
      font-size: 0.75rem;
      color: #8b949e;
      margin-top: 8px;
    }

    #coverInput { display: none; }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .submit-btn {
      flex: 1;
      padding: 12px;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover { background: #2ea043; }
    .submit-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    .cancel-btn {
      padding: 12px 20px;
      background: none;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .cancel-btn:hover { background: #161b22; color: #e1e4e8; }

    .status-message {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .status-message.visible { display: block; }
    .status-message.error { background: #2d1117; color: #f85149; border: 1px solid #da3633; }
    .status-message.info { background: #0d2033; color: #58a6ff; border: 1px solid #1f6feb; }

    .loading { text-align: center; padding: 40px; color: #484f58; }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>Edit Project</h1>
    <a href="/">&larr; Back to Projects</a>
  </div>

  <div class="container">
    <div id="loadingState" class="loading">Loading project...</div>

    <div id="formContainer" style="display:none;">
      <h2>Edit Project</h2>
      <p class="subtitle">Update the project address and cover photo. The project name cannot be changed.</p>

      <form id="projectForm">
        <div class="field">
          <label class="field-label" for="projectName">Project Name</label>
          <input class="field-input" type="text" id="projectName" readonly>
          <div class="field-hint">Project name is immutable.</div>
        </div>

        <div class="field">
          <label class="field-label" for="projectAddress">Project Address</label>
          <input class="field-input" type="text" id="projectAddress" placeholder="Full address">
        </div>

        <div class="field">
          <label class="field-label">Cover Photo</label>
          <div class="cover-dropzone" id="coverDropzone">
            <div id="coverPrompt">
              <p>Drag & drop a new image here, or <strong>browse</strong></p>
            </div>
            <img class="cover-preview" id="coverPreview" alt="Cover">
          </div>
          <div class="cover-meta" id="coverMeta"></div>
          <input type="file" id="coverInput" accept="image/*">
        </div>

        <div class="btn-row">
          <a href="/" class="cancel-btn">Cancel</a>
          <button type="submit" class="submit-btn" id="submitBtn">Save Changes</button>
        </div>
        <div class="status-message" id="statusMessage"></div>
      </form>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const project = params.get("project");

    if (!project) {
      document.getElementById("loadingState").textContent = "No project specified. Go back to Projects.";
    } else {
      loadProject();
    }

    const form = document.getElementById("projectForm");
    const nameEl = document.getElementById("projectName");
    const addressEl = document.getElementById("projectAddress");
    const dropzone = document.getElementById("coverDropzone");
    const coverInput = document.getElementById("coverInput");
    const coverPrompt = document.getElementById("coverPrompt");
    const coverPreview = document.getElementById("coverPreview");
    const coverMeta = document.getElementById("coverMeta");
    const submitBtn = document.getElementById("submitBtn");
    const statusMessage = document.getElementById("statusMessage");

    let coverFile = null;
    let currentInfo = null;

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(2) + " MB";
    }

    async function loadProject() {
      try {
        const res = await fetch(`/api/project-info?project=${encodeURIComponent(project)}`);
        if (!res.ok) throw new Error("Failed to load project");
        const info = await res.json();
        currentInfo = info;

        nameEl.value = info.name || project;
        addressEl.value = info.address || "";

        if (info.coverPhoto) {
          coverPreview.src = `/api/2d/image?file=${encodeURIComponent(info.coverPhoto)}`;
          coverPreview.classList.add("visible");
          coverPrompt.style.display = "none";
          coverMeta.textContent = "Current cover — click or drop to replace";
        } else {
          coverMeta.textContent = "No cover photo — click or drop to add one";
        }

        document.getElementById("loadingState").style.display = "none";
        document.getElementById("formContainer").style.display = "block";
      } catch (err) {
        document.getElementById("loadingState").textContent = "Error: " + err.message;
      }
    }

    function setCover(file) {
      if (!file.type.startsWith("image/")) return;
      coverFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        coverPreview.src = e.target.result;
        coverPreview.classList.add("visible");
        coverPrompt.style.display = "none";
      };
      reader.readAsDataURL(file);
      coverMeta.textContent = `New: ${file.name} (${formatSize(file.size)})`;
    }

    dropzone.addEventListener("click", () => coverInput.click());
    dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("drag-over"); });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag-over"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("drag-over");
      if (e.dataTransfer.files.length > 0) setCover(e.dataTransfer.files[0]);
    });
    coverInput.addEventListener("change", () => {
      if (coverInput.files.length > 0) setCover(coverInput.files[0]);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = "Saving...";
      statusMessage.textContent = "Saving changes...";
      statusMessage.className = "status-message visible info";

      try {
        const formData = new FormData();
        formData.append("name", project);
        formData.append("address", addressEl.value.trim());
        if (coverFile) formData.append("coverPhoto", coverFile);

        const res = await fetch("/api/update-project", { method: "POST", body: formData });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || "Failed to save");

        window.location.href = "/";
      } catch (err) {
        statusMessage.textContent = "Error: " + err.message;
        statusMessage.className = "status-message visible error";
        submitBtn.disabled = false;
        submitBtn.textContent = "Save Changes";
      }
    });
  </script>
</body>
</html>
