<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documents — GT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app.css">
  <script src="/me.js"></script>
  <script src="/shared-assets.js"></script>
  <style>
    /* Project name lives in the body above the category title rather
       than the header — long names were wrapping the user chip and
       hamburger onto a second row on mobile. */
    a.project-headline {
      display: block;
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-subtle);
      text-decoration: none;
      margin-bottom: 4px;
      overflow-wrap: anywhere;
    }
    a.project-headline:hover { color: var(--accent); }

    .page-head { margin-bottom: var(--space-md); display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-sm); flex-wrap: wrap; }
    .page-head h1 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(1.5rem, 3vw, 1.875rem);
      letter-spacing: -0.02em;
      margin: 0;
    }
    .page-head .upload-link {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
    }
    .page-head .upload-link:hover { text-decoration: underline; }

    /* Mobile-first stacked list. Each row: name + view/download links on
       line 1; type · size · uploaded (uploader on hover) on line 2;
       editor actions (rename / public-private toggle / delete) on an
       optional line 3. Long filenames get truncated to 20 chars in
       the visible label with the full name in title= for hover. */
    .docs-list {
      list-style: none;
      margin: 0;
      padding: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--line);
    }
    .doc-row {
      position: relative;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .doc-row:last-child { border-bottom: none; }
    .doc-row.is-hidden { opacity: 0.55; }
    .doc-row-primary {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .doc-name {
      font-weight: 500;
      color: var(--ink);
      cursor: default;
    }
    .doc-row-meta {
      font-size: 0.75rem;
      color: var(--ink-muted);
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .doc-row-meta .doc-type {
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .doc-row-meta .doc-uploaded { cursor: help; }
    .doc-row-meta .doc-vis-tag {
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      font-size: 0.68rem;
    }
    .doc-row-meta .doc-vis-tag.private { color: var(--ink-subtle); }
    .doc-row-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding-top: 0.35rem;
      margin-top: 0.15rem;
      border-top: 1px dashed var(--line);
      font-size: 0.75rem;
    }
    .doc-link {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-size: 0.8125rem;
    }
    .doc-link:hover { text-decoration: underline; }
    .doc-link.danger { color: var(--danger); }
    .doc-link[aria-disabled="true"] { opacity: 0.5; pointer-events: none; }

    .placeholder {
      text-align: center;
      padding: var(--space-2xl) var(--space-md);
      color: var(--ink-subtle);
      border: 1px solid var(--line);
      background: var(--bg-elevated);
    }
    .placeholder .placeholder-icon { font-size: 2.5rem; margin-bottom: var(--space-sm); }
    .error-msg { color: var(--danger); padding: var(--space-md); background: var(--danger-bg); border: 1px solid var(--danger); }

    /* Inline PDF viewer modal — same shell as project-plans.html. The
       <iframe> hands rendering to the browser's built-in PDF viewer
       (PDFium / WebKit / etc.); no PDF.js dependency. */
    .pdf-modal {
      position: fixed;
      inset: 0;
      background: var(--ink);
      z-index: 1000;
      display: none;
      flex-direction: column;
    }
    .pdf-modal.visible { display: flex; }
    .pdf-modal-bar {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      flex-shrink: 0;
    }
    .pdf-modal-title {
      flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-size: 0.85rem; letter-spacing: 0.04em;
    }
    .pdf-modal-download, .pdf-modal-close {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 0.4rem 0.75rem;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .pdf-modal-download:hover, .pdf-modal-close:hover {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    .pdf-modal-close { width: 36px; padding: 0.4rem; font-size: 1.1rem; }
    .pdf-modal-body { flex: 1; display: flex; align-items: center; justify-content: center; background: #3b4048; min-height: 0; }
    .pdf-modal-body iframe { width: 100%; height: 100%; border: 0; background: #fff; }
    .pdf-modal-body .no-preview {
      text-align: center; color: rgba(255, 255, 255, 0.8);
      padding: var(--space-lg);
      font-size: 0.95rem;
    }
    .pdf-modal-body .no-preview p { margin: 0 0 var(--space-md); }
    .pdf-modal-loading {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
  </style>
</head>
<body class="category-page">
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/">
        <img class="logo__mark" src="https://gt3d.com/images/logo-mark.svg" alt="" width="36" height="36" decoding="async">
        Ground Truth <span>3D</span>
      </a>
      <nav class="nav-primary" aria-label="Primary">
        <a class="nav-map" href="#">Map</a>
        <a class="nav-images" href="#">2D Images</a>
        <a class="nav-plans" href="#">2D Plans</a>
        <a class="nav-models" href="#">3D Models</a>
        <a class="nav-pointclouds" href="#">Point Clouds</a>
        <a href="https://gt3d.com" target="_blank" rel="noopener">GT3D Home</a>
      </nav>
      <button class="menu-toggle mobile-only" id="menuBtn" aria-label="Menu" aria-expanded="false" aria-controls="menuDropdown">
        <span class="bar"></span>
      </button>
    </div>
    <div class="dropdown-panel" id="menuDropdown">
      <div class="dropdown-inner">
        <a class="nav-map" href="#">Map</a>
        <a class="nav-images" href="#">2D Images</a>
        <a class="nav-plans" href="#">2D Plans</a>
        <a class="nav-models" href="#">3D Models</a>
        <a class="nav-pointclouds" href="#">Point Clouds</a>
        <a href="https://gt3d.com" target="_blank" rel="noopener">GT3D Home</a>
      </div>
    </div>
  </header>

  <main class="container">
    <a class="project-headline" id="projectHeadline" href="#"></a>
    <div class="page-head">
      <h1>Documents</h1>
      <a href="#" class="upload-link" id="adminUploadLink" style="display:none;">+ Manage documents</a>
    </div>

    <div id="docsWrap">
      <div class="placeholder">
        <p>Loading…</p>
      </div>
    </div>
  </main>

  <!-- Inline PDF viewer modal -->
  <div class="pdf-modal" id="pdfModal" role="dialog" aria-modal="true">
    <div class="pdf-modal-bar">
      <span class="pdf-modal-title" id="pdfTitle"></span>
      <a class="pdf-modal-download" id="pdfDownload" href="#" download>Download</a>
      <button class="pdf-modal-close" id="pdfClose" aria-label="Close">&times;</button>
    </div>
    <div class="pdf-modal-body" id="pdfBody"></div>
  </div>

  <script>
    let project = null;
    const pathMatch = window.location.pathname.match(/^\/documents\/(.+?)\/?$/);
    if (pathMatch) project = decodeURIComponent(pathMatch[1]);

    const wrap = document.getElementById("docsWrap");
    const projectHeadline = document.getElementById("projectHeadline");

    if (!project) {
      wrap.innerHTML = '<div class="error-msg">No project specified. URL should be /documents/&lt;project-name&gt;.</div>';
    } else {
      // Set the short project name (info.name from /api/project-info)
      // — the URL slug is the long compound for migrated projects.
      window.me.applyProjectHeadline(project, projectHeadline);
      const enc = encodeURIComponent(project);
      // Default to the no-IAP /public/ mirror for anonymous viewers; the
      // editor IIFE below overrides to /<project> for editors.
      projectHeadline.href = `/public/${enc}`;
      // Standard viewer nav links — class-based selectors wire both the
      // desktop nav and the mobile dropdown in one pass.
      document.querySelectorAll(".nav-map").forEach((a) => a.href = `/map-viewer/${enc}`);
      document.querySelectorAll(".nav-images").forEach((a) => a.href = `/images/${enc}`);
      document.querySelectorAll(".nav-plans").forEach((a) => a.href = `/plans/${enc}`);
      document.querySelectorAll(".nav-models").forEach((a) => a.href = `/models/${enc}`);
      document.querySelectorAll(".nav-pointclouds").forEach((a) => a.href = `/pointclouds/${enc}`);

      // Admin shortcut + non-editor logo redirect, mirroring other showcase
      // pages so anonymous viewers don't bounce into IAP via the brand mark.
      // Editors get the shared editor-nav hamburger cluster + project menu.
      (async () => {
        const isEditor = window.me ? await window.me.canEdit(project) : false;
        if (isEditor) {
          const a = document.getElementById("adminUploadLink");
          a.href = `/document-upload.html?project=${encodeURIComponent(project)}`;
          a.style.display = "";
        }
        if (!isEditor) {
          const logo = document.querySelector(".site-header .logo");
          if (logo) logo.href = `/public/${encodeURIComponent(project)}`;
        } else {
          document.body.classList.add("editor-nav");
          // Editors get the editable home at /<project>.
          if (projectHeadline) projectHeadline.href = `/${enc}`;
          const isAdminUser = window.me ? !!(await window.me.isAdmin()) : false;
          const editProjectItem = isAdminUser
            ? `<a href="/edit-project.html?project=${enc}">Edit Project Information</a>`
            : "";
          const dd = document.querySelector("#menuDropdown .dropdown-inner");
          if (dd) {
            dd.innerHTML = `
              <a href="/map-viewer/${enc}">Map</a>
              <a href="/images/${enc}">2D Images</a>
              <a href="/plans/${enc}">2D Plans</a>
              <a href="/models/${enc}">Models</a>
              <a href="/documents/${enc}">Documents</a>
              <a href="/videos/${enc}">Videos</a>
              <a href="/users.html?project=${enc}">Users</a>
              ${editProjectItem}
              <a href="/${enc}">Project Home</a>
            `;
          }
        }
      })();

      loadDocuments(project);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }
    function escapeAttr(s) { return escapeHtml(s); }
    function formatSize(bytes) {
      if (!bytes && bytes !== 0) return "—";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(2) + " MB";
      return (bytes / 1024 / 1024 / 1024).toFixed(2) + " GB";
    }
    function formatWhen(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      return d.toLocaleString();
    }
    function fileTypeFor(name) {
      const m = String(name || "").match(/\.([a-z0-9]+)$/i);
      return m ? m[1].toUpperCase() : "FILE";
    }
    function isPdfDoc(d) {
      if ((d.contentType || "").toLowerCase() === "application/pdf") return true;
      const ext = String(d.displayName || d.name || "").match(/\.([a-z0-9]+)$/i);
      return !!(ext && ext[1].toLowerCase() === "pdf");
    }

    async function loadDocuments(project) {
      const me = window.me ? await window.me.getMe() : { email: null, isAdmin: false };
      const isSignedIn = !!me.email;
      const isAdmin = !!me.isAdmin;
      // Editors get the same inline action affordances as admins
      // (B1 widened the API; canEdit covers admin OR project editor).
      const canEdit = isAdmin || !!(window.me && await window.me.canEdit(project));
      try {
        // Admins must hit the admin-routed endpoint — the public listing
        // sits behind the no-IAP backend (so /documents/<project> is
        // anonymous-reachable) and can't see admin identity, so it would
        // hide private docs from admins. The admin endpoint stays off the
        // public URL-map and routes through IAP, preserving role.
        const listUrl = isAdmin
          ? `/api/admin/document/files?project=${encodeURIComponent(project)}`
          : `/api/document/files?project=${encodeURIComponent(project)}`;
        const res = await fetch(listUrl, { credentials: "same-origin" });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`);
        const docs = await res.json();
        // Server already sorts by uploadedAt desc, but re-sort defensively
        // to guard against stale clients hitting an older server build.
        docs.sort((a, b) => (b.uploadedAt || "").localeCompare(a.uploadedAt || ""));

        if (docs.length === 0) {
          wrap.innerHTML = '<div class="placeholder"><div class="placeholder-icon">&#128196;</div><p>No documents available for this project yet.</p></div>';
          return;
        }

        function truncate20(s) {
          const str = String(s || "");
          return str.length > 20 ? str.slice(0, 20) + "…" : str;
        }

        const ul = document.createElement("ul");
        ul.className = "docs-list";

        docs.forEach((d) => {
          const li = document.createElement("li");
          li.className = "doc-row";
          li.dataset.file = d.name;
          if (d.shared) li.dataset.shared = "1";
          if (d.ownerProjectId) li.dataset.ownerProjectId = d.ownerProjectId;

          const typeLabel = fileTypeFor(d.displayName);
          // Uploader email goes on a hover-tooltip over the date cell;
          // /api/document/files only includes uploadedBy for admin callers
          // today, so non-admins see the date with no extra detail.
          const uploadedTitle = d.uploadedBy ? `Uploaded by ${d.uploadedBy}` : "";
          const visibilityTag = d.visibility
            ? `<span class="doc-vis-tag${d.visibility === "private" ? " private" : ""}">${escapeHtml(d.visibility)}</span>`
            : "";
          const viewLink = (isSignedIn && isPdfDoc(d))
            ? `<a class="doc-link doc-view-link" href="#">view</a>`
            : "";
          // Editor extras: rename + visibility toggle suppressed on
          // shared docs (they propagate property-wide; manage from the
          // owner project). Delete is available for everyone with edit
          // rights — the modal handles the shared confirmation flow.
          let editorActions = "";
          if (canEdit) {
            const parts = [];
            if (!d.shared) {
              parts.push(`<a class="doc-link doc-rename-link" href="#">rename</a>`);
              const next = d.visibility === "public" ? "private" : "public";
              parts.push(`<a class="doc-link doc-vis-link" href="#" data-next="${next}">make ${next}</a>`);
            }
            parts.push(`<a class="doc-link danger doc-delete-link" href="#">delete</a>`);
            editorActions = `<div class="doc-row-actions">${parts.join("")}</div>`;
          }

          li.innerHTML = `
            ${window.sharedAssets ? window.sharedAssets.ribbonHtml(d) : ""}
            <div class="doc-row-primary">
              <span class="doc-name" title="${escapeAttr(d.displayName)}">${escapeHtml(truncate20(d.displayName))}</span>
              ${viewLink}
              <a class="doc-link doc-download-link" href="#">download</a>
            </div>
            <div class="doc-row-meta">
              <span class="doc-type">${escapeHtml(typeLabel)}</span>
              <span>·</span>
              <span class="doc-size">${escapeHtml(formatSize(d.size))}</span>
              <span>·</span>
              <span class="doc-uploaded" title="${escapeAttr(uploadedTitle)}">${escapeHtml(formatWhen(d.uploadedAt || d.updated))}</span>
              ${visibilityTag ? `<span>·</span>${visibilityTag}` : ""}
            </div>
            ${editorActions}
          `;
          ul.appendChild(li);
        });

        wrap.innerHTML = "";
        wrap.appendChild(ul);

        function rowOf(target) { return target.closest(".doc-row"); }

        // View (PDFs, signed-in callers only).
        ul.querySelectorAll(".doc-view-link").forEach((a) => {
          a.addEventListener("click", (e) => {
            e.preventDefault();
            const li = rowOf(a);
            const filePath = li.dataset.file;
            const displayName = li.querySelector(".doc-name")?.title || filePath;
            openPdfPreview(filePath, displayName);
          });
        });

        // Download — admins use the admin-routed signed URL so private
        // docs work; everyone else hits the public route which respects
        // visibility.
        ul.querySelectorAll(".doc-download-link").forEach((a) => {
          a.addEventListener("click", async (e) => {
            e.preventDefault();
            const li = rowOf(a);
            const filePath = li.dataset.file;
            a.setAttribute("aria-disabled", "true"); const orig = a.textContent; a.textContent = "…";
            try {
              const dlUrl = isAdmin
                ? `/api/admin/document/download-url?file=${encodeURIComponent(filePath)}`
                : `/api/document/download-url?file=${encodeURIComponent(filePath)}`;
              const r = await fetch(dlUrl, { credentials: "same-origin" });
              if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || `HTTP ${r.status}`);
              const { downloadUrl } = await r.json();
              window.location.href = downloadUrl;
            } catch (err) {
              alert("Download failed: " + err.message);
            } finally {
              a.removeAttribute("aria-disabled"); a.textContent = orig;
            }
          });
        });

        if (!canEdit) return;

        // Rename via prompt — mobile-friendly replacement for the previous
        // contenteditable inline-edit. The full filename (including
        // extension) is editable; server-side validation handles bad input.
        ul.querySelectorAll(".doc-rename-link").forEach((a) => {
          a.addEventListener("click", async (e) => {
            e.preventDefault();
            const li = rowOf(a);
            const filePath = li.dataset.file;
            const current = li.querySelector(".doc-name")?.title || "";
            const next = window.prompt("Rename document to:", current);
            if (next == null) return;
            const trimmed = next.trim();
            if (!trimmed || trimmed === current) return;
            a.setAttribute("aria-disabled", "true");
            try {
              const r = await fetch("/api/document/rename", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "same-origin",
                body: JSON.stringify({ file: filePath, newName: trimmed }),
              });
              const data = await r.json().catch(() => ({}));
              if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
              loadDocuments(project);
            } catch (err) {
              alert("Rename failed: " + err.message);
              a.removeAttribute("aria-disabled");
            }
          });
        });

        // Visibility toggle — single-click flip between public and private.
        ul.querySelectorAll(".doc-vis-link").forEach((a) => {
          a.addEventListener("click", async (e) => {
            e.preventDefault();
            const li = rowOf(a);
            const filePath = li.dataset.file;
            const next = a.dataset.next;
            a.setAttribute("aria-disabled", "true");
            try {
              const r = await fetch("/api/document/visibility", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "same-origin",
                body: JSON.stringify({ file: filePath, visibility: next }),
              });
              if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || `HTTP ${r.status}`);
              loadDocuments(project);
            } catch (err) {
              alert("Visibility change failed: " + err.message);
              a.removeAttribute("aria-disabled");
            }
          });
        });

        // Delete (editor + admin). Shared docs go through the modal —
        // destructive delete is only offered when the requester is
        // editor on the owner project (or admin).
        ul.querySelectorAll(".doc-delete-link").forEach((a) => {
          a.addEventListener("click", async (e) => {
            e.preventDefault();
            const li = rowOf(a);
            const filePath = li.dataset.file;
            const displayName = li.querySelector(".doc-name")?.title || filePath;
            const isShared = li.dataset.shared === "1";
            if (isShared && window.sharedAssets) {
              const item = { shared: true, ownerProjectId: li.dataset.ownerProjectId || null };
              const canDelete = await window.sharedAssets.canDeleteShared(project, item);
              const choice = await window.sharedAssets.confirmSharedDelete({ displayName, canDelete });
              if (choice === "cancel") return;
              a.setAttribute("aria-disabled", "true"); const orig = a.textContent;
              a.textContent = choice === "delete" ? "deleting…" : "hiding…";
              try {
                if (choice === "hide") {
                  await window.sharedAssets.setSharedHidden(project, filePath, true);
                } else {
                  const r = await fetch("/api/document/delete", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "same-origin",
                    body: JSON.stringify({ file: filePath }),
                  });
                  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || `HTTP ${r.status}`);
                }
                loadDocuments(project);
              } catch (err) {
                alert((choice === "hide" ? "Hide" : "Delete") + " failed: " + err.message);
                a.removeAttribute("aria-disabled"); a.textContent = orig;
              }
              return;
            }
            if (!confirm(`Delete "${displayName}"? This cannot be undone.`)) return;
            a.setAttribute("aria-disabled", "true"); const orig = a.textContent;
            a.textContent = "deleting…";
            try {
              const r = await fetch("/api/document/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "same-origin",
                body: JSON.stringify({ file: filePath }),
              });
              if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || `HTTP ${r.status}`);
              loadDocuments(project);
            } catch (err) {
              alert("Delete failed: " + err.message);
              a.removeAttribute("aria-disabled"); a.textContent = orig;
            }
          });
        });
      } catch (err) {
        wrap.innerHTML = `<div class="error-msg">${escapeHtml(err.message)}</div>`;
      }
    }

    // ---- Inline PDF viewer modal ----
    // Hands rendering to the browser's built-in PDF viewer via an
    // <iframe> pointed at a signed inline URL. /api/document/view-url
    // is IAP-gated and respects visibility, so only signed-in callers
    // who can read the document end up with a working URL.
    const pdfModal = document.getElementById("pdfModal");
    const pdfBody = document.getElementById("pdfBody");
    const pdfTitle = document.getElementById("pdfTitle");
    const pdfClose = document.getElementById("pdfClose");
    const pdfDownload = document.getElementById("pdfDownload");

    async function openPdfPreview(filePath, displayName) {
      pdfTitle.textContent = displayName;
      pdfBody.innerHTML = '<div class="pdf-modal-loading">Loading…</div>';
      pdfDownload.removeAttribute("href");
      pdfModal.classList.add("visible");
      document.body.style.overflow = "hidden";

      try {
        const res = await fetch(`/api/document/view-url?file=${encodeURIComponent(filePath)}`, { credentials: "same-origin" });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`);
        const { viewUrl } = await res.json();
        pdfBody.innerHTML = `<iframe src="${escapeAttr(viewUrl)}#toolbar=1&navpanes=0" title="${escapeAttr(displayName)}"></iframe>`;

        // Wire the toolbar Download button to a proper attachment URL
        // (admins via the admin route so private docs work too).
        try {
          const isAdminCaller = !!(window.me && await window.me.isAdmin());
          const dlUrl = isAdminCaller
            ? `/api/admin/document/download-url?file=${encodeURIComponent(filePath)}`
            : `/api/document/download-url?file=${encodeURIComponent(filePath)}`;
          const dl = await fetch(dlUrl, { credentials: "same-origin" });
          if (dl.ok) {
            const { downloadUrl } = await dl.json();
            pdfDownload.href = downloadUrl;
          } else {
            pdfDownload.href = viewUrl;
          }
        } catch {
          pdfDownload.href = viewUrl;
        }
      } catch (err) {
        pdfBody.innerHTML = `<div class="no-preview"><p>Failed to load preview: ${escapeHtml(err.message)}</p></div>`;
      }
    }

    function closePdfPreview() {
      pdfModal.classList.remove("visible");
      pdfBody.innerHTML = "";
      document.body.style.overflow = "";
    }

    pdfClose.addEventListener("click", closePdfPreview);
    pdfModal.addEventListener("click", (e) => {
      if (e.target === pdfModal) closePdfPreview();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && pdfModal.classList.contains("visible")) closePdfPreview();
    });

    // Mobile hamburger menu — toggle, click-outside, Escape to close
    (function () {
      const btn = document.getElementById("menuBtn");
      const panel = document.getElementById("menuDropdown");
      if (!btn || !panel) return;
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const open = panel.classList.toggle("is-open");
        btn.setAttribute("aria-expanded", open);
      });
      document.addEventListener("click", (e) => {
        if (!e.target.closest("#menuDropdown") && !e.target.closest("#menuBtn")) {
          panel.classList.remove("is-open");
          btn.setAttribute("aria-expanded", "false");
        }
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          panel.classList.remove("is-open");
          btn.setAttribute("aria-expanded", "false");
        }
      });
    })();
  </script>
</body>
</html>
