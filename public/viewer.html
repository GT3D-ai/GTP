<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360 Photo Viewer — GT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.js"></script>
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app.css">
  <script src="/me.js"></script>
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .level-bar {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: 0.5rem var(--space-md);
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .level-bar label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .level-bar select {
      padding: 0.4rem 0.65rem;
      background: var(--bg-elevated);
      border: 1px solid var(--line-strong);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 0.8125rem;
      outline: none;
      min-width: 160px;
      transition: border-color var(--transition);
    }
    .level-bar select:focus { border-color: var(--ink); }
    .level-bar .btn-sm { padding: 0.4rem 0.75rem; border: 1px solid var(--line-strong); background: transparent; }

    .main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .sidebar {
      width: 300px;
      background: var(--bg-elevated);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 0.875rem var(--space-sm);
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--line);
    }

    .file-list {
      flex: 1;
      overflow-y: auto;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem var(--space-sm);
      cursor: pointer;
      transition: background var(--transition);
      border-bottom: 1px solid var(--line);
    }
    .file-item:hover { background: var(--bg); }
    .file-item.active {
      background: var(--warning-bg);
      border-left: 2px solid var(--accent);
      padding-left: calc(var(--space-sm) - 2px);
    }

    .file-item-icon {
      font-size: 1rem;
      color: var(--ink-subtle);
      flex-shrink: 0;
      width: 20px;
      text-align: center;
    }
    .file-item-info { flex: 1; min-width: 0; }
    .file-item-name { font-size: 0.8125rem; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-item-meta { font-size: 0.7rem; color: var(--ink-subtle); margin-top: 2px; }

    .file-item-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .assign-select {
      padding: 2px 6px;
      background: var(--bg);
      border: 1px solid var(--line-strong);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 0.68rem;
      outline: none;
      max-width: 110px;
      cursor: pointer;
    }
    .assign-select:focus { border-color: var(--ink); }

    .delete-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--ink-subtle);
      padding: 3px 6px;
      cursor: pointer;
      font-size: 0.8rem;
      line-height: 1;
      transition: all var(--transition);
    }
    .delete-btn:hover { color: var(--danger); border-color: var(--danger); }

    .viewer-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: var(--secondary-block);
    }
    #panorama { width: 100%; height: 100%; }

    .placeholder { text-align: center; color: rgba(255,255,255,0.45); padding: var(--space-md); }
    .placeholder-icon { font-size: 2.5rem; margin-bottom: var(--space-sm); }
    .placeholder p { font-size: 0.9rem; margin: 0; }

    .loading-overlay {
      position: absolute; inset: 0;
      background: rgba(42, 47, 54, 0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      color: rgba(255,255,255,0.8);
      font-size: 0.875rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .loading-overlay.hidden { display: none; }

    .error-msg { color: var(--danger); text-align: center; padding: var(--space-md); }

    @media (max-width: 720px) {
      .sidebar { width: 240px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/">
        <img class="logo__mark" src="https://gt3d.com/images/logo-mark.svg" alt="" width="36" height="36" decoding="async">
        Ground Truth <span>3D</span>
      </a>
      <nav class="nav-primary" aria-label="Primary">
        <a href="/">Projects</a>
        <a id="mapEditorLink" href="/map-editor.html">Map</a>
        <a id="imagesLink" href="/images.html">Upload 2D</a>
        <a id="uploadLink" href="/upload.html">Upload 360</a>
      </nav>
    </div>
  </header>

  <div class="level-bar" id="levelBar" style="display:none;">
    <label for="levelSelect">Level</label>
    <select id="levelSelect">
      <option value="">All Levels</option>
    </select>
    <button class="btn btn-sm btn-outline" id="createLevelBtn">+ Level</button>
    <span id="projectLabel" style="margin-left:auto; font-size:0.8125rem; color:var(--ink-muted);"></span>
  </div>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-header">Images</div>
      <div class="file-list" id="fileList">
        <div class="placeholder" style="color:var(--ink-subtle); padding: var(--space-md);">
          <p>Loading…</p>
        </div>
      </div>
    </aside>

    <div class="viewer-area">
      <div id="panorama">
        <div class="placeholder" id="viewerPlaceholder">
          <div class="placeholder-icon">&#127758;</div>
          <p>Select an image to view</p>
        </div>
      </div>
      <div class="loading-overlay hidden" id="loadingOverlay">Loading panorama…</div>
    </div>
  </div>

  <script>
    const fileList = document.getElementById("fileList");
    const panoramaEl = document.getElementById("panorama");
    const viewerPlaceholder = document.getElementById("viewerPlaceholder");
    const loadingOverlay = document.getElementById("loadingOverlay");

    let viewer = null;

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(2) + " MB";
    }

    const params = new URLSearchParams(window.location.search);
    const project = params.get("project");
    const levelSelect = document.getElementById("levelSelect");
    const levelBar = document.getElementById("levelBar");
    const createLevelBtn = document.getElementById("createLevelBtn");
    const projectLabel = document.getElementById("projectLabel");
    let currentLevel = "";
    let cachedLevels = [];

    if (project) {
      projectLabel.textContent = project;
      updateLinks();
      levelBar.style.display = "flex";
      loadLevels();
    }

    function updateLinks() {
      let upload = `/upload.html?project=${encodeURIComponent(project)}`;
      if (currentLevel) upload += `&level=${encodeURIComponent(currentLevel)}`;
      document.getElementById("uploadLink").href = upload;
      document.getElementById("imagesLink").href = `/images.html?project=${encodeURIComponent(project)}`;
      document.getElementById("mapEditorLink").href = `/map-editor.html?project=${encodeURIComponent(project)}`;
    }

    async function loadLevels() {
      try {
        const res = await fetch(`/api/levels?project=${encodeURIComponent(project)}`);
        if (!res.ok) return;
        const levels = await res.json();
        cachedLevels = levels;
        levelSelect.innerHTML = '<option value="">All Levels</option>';
        levels.forEach((lvl) => {
          const opt = document.createElement("option");
          opt.value = lvl;
          opt.textContent = lvl;
          levelSelect.appendChild(opt);
        });
        if (currentLevel) levelSelect.value = currentLevel;
      } catch {}
    }

    levelSelect.addEventListener("change", () => {
      currentLevel = levelSelect.value;
      updateLinks();
      loadFiles();
    });

    createLevelBtn.addEventListener("click", async () => {
      const name = prompt("Enter level name:");
      if (!name || !name.trim()) return;
      try {
        const res = await fetch("/api/create-level", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ project, level: name.trim() }),
        });
        if (!res.ok) throw new Error("Failed to create level");
        await loadLevels();
        levelSelect.value = name.trim();
        currentLevel = name.trim();
        updateLinks();
        loadFiles();
      } catch (err) {
        alert("Error creating level: " + err.message);
      }
    });

    async function loadFiles() {
      try {
        let url = "/api/files";
        const qp = new URLSearchParams();
        if (project) qp.set("project", project);
        if (currentLevel) qp.set("level", currentLevel);
        if (qp.toString()) url += "?" + qp.toString();
        const res = await fetch(url);
        if (!res.ok) throw new Error("Failed to load files");
        const files = await res.json();

        let unassignedNames = new Set();
        if (project && !currentLevel) {
          const uRes = await fetch(`/api/files?project=${encodeURIComponent(project)}&unassigned=true`);
          if (uRes.ok) {
            const uFiles = await uRes.json();
            uFiles.forEach((f) => unassignedNames.add(f.name));
          }
        }

        if (files.length === 0) {
          fileList.innerHTML = '<div class="placeholder" style="padding:var(--space-md); color:var(--ink-subtle);"><p>No photos in this project</p></div>';
          return;
        }

        fileList.innerHTML = "";
        files.forEach((file) => {
          const item = document.createElement("div");
          item.className = "file-item";

          let fileCurrentLevel = "";
          // The API returns displayName as the project-relative path,
          // which works correctly for both pre- and post-migration
          // layouts (the slug-based replace breaks for migrated paths
          // since the slug != the physical prefix).
          const relPath = file.displayName || (project ? file.name.replace(project + "/", "") : file.name);
          if (relPath) {
            const parts = relPath.split("/");
            if (parts.length > 1) fileCurrentLevel = parts[0];
          }

          let assignHtml = "";
          if (project && cachedLevels.length > 0) {
            const options = cachedLevels
              .filter((l) => l !== fileCurrentLevel)
              .map((l) => `<option value="${l}">${l}</option>`)
              .join("");
            const unassignOpt = fileCurrentLevel ? `<option value="__unassign__">Unassigned</option>` : "";
            const label = fileCurrentLevel ? "Move…" : "Assign…";
            assignHtml = `<select class="assign-select" data-file="${file.name}" title="Change level">
              <option value="">${label}</option>
              ${options}
              ${unassignOpt}
            </select>`;
          }

          item.innerHTML = `
            <span class="file-item-icon">&#127758;</span>
            <div class="file-item-info">
              <div class="file-item-name" title="${file.displayName}">${file.displayName}</div>
              <div class="file-item-meta">${formatSize(file.size)}</div>
            </div>
            <div class="file-item-actions">
              ${assignHtml}
              <button class="delete-btn" title="Delete">&#128465;</button>
            </div>
          `;

          item.addEventListener("click", (e) => {
            if (e.target.closest(".file-item-actions")) return;
            loadPanorama(file.name, item);
          });

          const sel = item.querySelector(".assign-select");
          if (sel) {
            sel.addEventListener("change", async (e) => {
              e.stopPropagation();
              const level = sel.value;
              if (!level) return;
              sel.disabled = true;
              try {
                const assignLevel = level === "__unassign__" ? "" : level;
                const r = await fetch("/api/assign-level", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ file: file.name, project, level: assignLevel }),
                });
                if (!r.ok) throw new Error("Failed to change level");
                loadFiles();
              } catch (err) {
                alert("Error changing level: " + err.message);
                sel.disabled = false;
                sel.value = "";
              }
            });
          }

          const delBtn = item.querySelector(".delete-btn");
          delBtn.addEventListener("click", async (e) => {
            e.stopPropagation();
            if (!confirm(`Delete "${file.displayName}"? This cannot be undone.`)) return;
            delBtn.disabled = true;
            try {
              const r = await fetch("/api/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ file: file.name }),
              });
              if (!r.ok) throw new Error("Failed to delete");
              if (item.classList.contains("active")) {
                if (viewer) { viewer.destroy(); viewer = null; }
                panoramaEl.innerHTML = `<div class="placeholder" id="viewerPlaceholder"><div class="placeholder-icon">&#127758;</div><p>Select an image to view</p></div>`;
              }
              loadFiles();
            } catch (err) {
              alert("Error deleting photo: " + err.message);
              delBtn.disabled = false;
            }
          });

          fileList.appendChild(item);
        });
      } catch (err) {
        fileList.innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    function isPanoramic(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => { const ratio = img.width / img.height; resolve(ratio >= 1.8 && ratio <= 2.2); };
        img.onerror = () => resolve(false);
        img.src = url;
      });
    }

    function showViewerError(msg) {
      if (viewer) { viewer.destroy(); viewer = null; }
      panoramaEl.innerHTML = `<div class="placeholder"><div class="placeholder-icon">&#128247;</div><p style="color:#ff8a7a">${msg}</p></div>`;
      loadingOverlay.classList.add("hidden");
      setTimeout(() => {
        panoramaEl.innerHTML = `<div class="placeholder" id="viewerPlaceholder"><div class="placeholder-icon">&#127758;</div><p>Select an image to view</p></div>`;
        document.querySelectorAll(".file-item.active").forEach((el) => el.classList.remove("active"));
      }, 3000);
    }

    async function loadPanorama(fileName, itemEl) {
      document.querySelectorAll(".file-item.active").forEach((el) => el.classList.remove("active"));
      itemEl.classList.add("active");
      viewerPlaceholder.style.display = "none";
      loadingOverlay.classList.remove("hidden");

      try {
        const url = `/api/image?file=${encodeURIComponent(fileName)}`;
        const panoramic = await isPanoramic(url);
        if (!panoramic) { showViewerError("The selected file is not a panoramic image"); return; }

        if (viewer) { viewer.destroy(); viewer = null; }

        viewer = pannellum.viewer("panorama", {
          type: "equirectangular",
          panorama: url,
          autoLoad: true,
          compass: true,
          showControls: true,
          mouseZoom: true,
          autoRotate: -2,
          loadedCallback: () => loadingOverlay.classList.add("hidden"),
        });

        setTimeout(() => loadingOverlay.classList.add("hidden"), 8000);
      } catch (err) {
        loadingOverlay.classList.add("hidden");
        panoramaEl.innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    loadFiles().then(() => {
      const autoImage = params.get("image");
      if (autoImage) {
        const items = document.querySelectorAll(".file-item");
        let found = false;
        for (const item of items) {
          const nameEl = item.querySelector(".file-item-name");
          if (nameEl) {
            const displayName = autoImage.split("/").pop();
            if (nameEl.textContent === displayName || nameEl.getAttribute("title") === displayName) {
              loadPanorama(autoImage, item);
              found = true;
              break;
            }
          }
        }
        if (!found) {
          const tempEl = document.createElement("div");
          tempEl.className = "file-item";
          loadPanorama(autoImage, tempEl);
        }
      }
    });
  </script>
</body>
</html>
