<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }

    .project-headline {
      font-size: 0.95rem;
      font-weight: 600;
      color: #f0f3f6;
      letter-spacing: 0.2px;
    }

    .top-bar a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.82rem;
    }

    .top-bar a:hover { text-decoration: underline; }

    .map-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #0a0c10;
    }

    .map-container {
      position: relative;
      display: inline-block;
      max-width: 100%;
      max-height: 100%;
      transform-origin: 0 0;
      will-change: transform;
    }

    .map-area { cursor: default; }
    .map-area.zoomed { cursor: grab; }
    .map-area.panning { cursor: grabbing; }

    .zoom-indicator {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(22, 27, 34, 0.85);
      color: #8b949e;
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 50;
    }

    .zoom-indicator.visible { opacity: 1; }

    .map-container img {
      max-width: 100%;
      max-height: calc(100vh - 120px);
      display: block;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .placeholder {
      text-align: center;
      color: #484f58;
    }

    .placeholder-icon { font-size: 3rem; margin-bottom: 12px; }
    .placeholder p { font-size: 0.95rem; }

    .pin {
      position: absolute;
      width: 16px;
      height: 16px;
      background: #ffffff;
      border: 2px solid #0f1117;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 5;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .pin:hover {
      transform: translate(-50%, -50%) scale(1.35);
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.9);
    }

    .pin-tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.72rem;
      color: #e1e4e8;
      white-space: nowrap;
      pointer-events: none;
      display: none;
      z-index: 10;
    }

    .pin:hover .pin-tooltip { display: block; }

    .level-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 20px;
      background: #161b22;
      border-top: 1px solid #30363d;
      flex-shrink: 0;
    }

    .level-bar label {
      font-size: 0.75rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .level-bar select {
      padding: 5px 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e1e4e8;
      font-size: 0.85rem;
      outline: none;
      min-width: 140px;
    }

    .level-bar select:focus { border-color: #58a6ff; }

    /* Fullscreen 360 modal */
    .viewer-modal {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 1000;
      display: none;
    }

    .viewer-modal.visible { display: block; }

    #pano360 {
      width: 100%;
      height: 100%;
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 42px;
      height: 42px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      z-index: 1010;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.15s;
    }

    .close-btn:hover {
      background: rgba(248, 81, 73, 0.9);
      transform: scale(1.08);
    }

    .modal-title {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #fff;
      font-size: 0.85rem;
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 12px;
      border-radius: 6px;
      z-index: 1010;
      max-width: calc(100% - 100px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1005;
      color: #e1e4e8;
      font-size: 0.95rem;
    }

    .loading-overlay.hidden { display: none; }

    .menu-container {
      position: relative;
    }

    .menu-btn {
      background: none;
      border: 1px solid #30363d;
      color: #e1e4e8;
      width: 36px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s, border-color 0.15s;
    }

    .menu-btn:hover {
      background: #21262d;
      border-color: #58a6ff;
    }

    .menu-btn svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .menu-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 4px 0;
      min-width: 160px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      display: none;
      z-index: 500;
    }

    .menu-dropdown.visible { display: block; }

    .menu-dropdown a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      font-size: 0.85rem;
      color: #e1e4e8;
      text-decoration: none;
      transition: background 0.1s;
    }

    .menu-dropdown a:hover {
      background: #21262d;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .top-bar { padding: 8px 14px; }
      .level-bar { padding: 8px 14px; }
      .project-headline { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="project-headline" id="projectHeadline">Map Viewer</div>
    <div class="menu-container">
      <button class="menu-btn" id="menuBtn" title="Menu" aria-label="Menu">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="2" y1="4" x2="14" y2="4"/>
          <line x1="2" y1="8" x2="14" y2="8"/>
          <line x1="2" y1="12" x2="14" y2="12"/>
        </svg>
      </button>
      <div class="menu-dropdown" id="menuDropdown">
        <a href="/">&#128194; Projects</a>
        <a id="editMapMenuItem" href="/map-editor.html">&#9998; Edit Map</a>
      </div>
    </div>
  </div>

  <div class="map-area" id="mapArea">
    <div class="placeholder" id="mapPlaceholder">
      <div class="placeholder-icon">&#128506;</div>
      <p>Loading map...</p>
    </div>
    <div class="map-container" id="mapContainer" style="display:none;">
      <img id="floorPlanImg" alt="Floor plan">
    </div>
    <div class="zoom-indicator" id="zoomIndicator">100%</div>
  </div>

  <div class="level-bar">
    <label for="levelSelect">Level:</label>
    <select id="levelSelect">
      <option value="">Loading...</option>
    </select>
  </div>

  <div class="viewer-modal" id="viewerModal">
    <div class="modal-title" id="modalTitle"></div>
    <button class="close-btn" id="closeBtn" title="Close">&times;</button>
    <div id="pano360"></div>
    <div class="loading-overlay" id="modalLoading">Loading 360 view...</div>
  </div>

  <script>
    // Extract project from URL: /map-viewer/<project-name> OR fallback to ?project=
    let project = null;
    const pathMatch = window.location.pathname.match(/^\/map-viewer\/(.+?)\/?$/);
    if (pathMatch) {
      project = decodeURIComponent(pathMatch[1]);
    } else {
      const params = new URLSearchParams(window.location.search);
      project = params.get("project");
    }

    const projectHeadline = document.getElementById("projectHeadline");
    const mapPlaceholder = document.getElementById("mapPlaceholder");
    const mapContainer = document.getElementById("mapContainer");
    const floorPlanImg = document.getElementById("floorPlanImg");
    const levelSelect = document.getElementById("levelSelect");
    const viewerModal = document.getElementById("viewerModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalLoading = document.getElementById("modalLoading");
    const closeBtn = document.getElementById("closeBtn");

    let mappings = { floorPlanImage: null, floorPlans: {}, pins: [] };

    function getFloorPlanForLevel(level) {
      if (level && mappings.floorPlans && mappings.floorPlans[level]) {
        return mappings.floorPlans[level];
      }
      return mappings.floorPlanImage || null;
    }
    let currentLevel = "level 1";
    let viewer = null;

    if (!project) {
      mapPlaceholder.innerHTML = '<div class="placeholder-icon">&#128679;</div><p>No project specified</p>';
    } else {
      projectHeadline.textContent = project;
      document.getElementById("editMapMenuItem").href = `/map-editor.html?project=${encodeURIComponent(project)}`;
      init();
    }

    // Hamburger menu toggle
    const menuBtn = document.getElementById("menuBtn");
    const menuDropdown = document.getElementById("menuDropdown");

    menuBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      menuDropdown.classList.toggle("visible");
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest(".menu-container")) {
        menuDropdown.classList.remove("visible");
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") menuDropdown.classList.remove("visible");
    });

    async function init() {
      await Promise.all([loadLevels(), loadMappings()]);
      refreshFloorPlanDisplay();
    }

    function refreshFloorPlanDisplay() {
      const path = getFloorPlanForLevel(currentLevel);
      if (path) {
        showFloorPlan(path);
      } else {
        mapContainer.style.display = "none";
        mapPlaceholder.style.display = "";
        mapPlaceholder.innerHTML = `<div class="placeholder-icon">&#128506;</div><p>No floor plan set for <strong>${currentLevel || "this level"}</strong>.<br><a href="/map-editor.html?project=${encodeURIComponent(project)}" style="color:#58a6ff">Open Map Editor</a> to configure.</p>`;
      }
    }

    async function loadLevels() {
      try {
        const res = await fetch(`/api/levels?project=${encodeURIComponent(project)}`);
        if (!res.ok) return;
        const levels = await res.json();
        levelSelect.innerHTML = "";
        if (levels.length === 0) {
          levelSelect.innerHTML = '<option value="">No levels</option>';
          return;
        }
        levels.forEach((lvl) => {
          const opt = document.createElement("option");
          opt.value = lvl;
          opt.textContent = lvl;
          levelSelect.appendChild(opt);
        });
        // Default to "level 1" if it exists, otherwise first level
        const defaultLevel = levels.includes("level 1") ? "level 1" : levels[0];
        currentLevel = defaultLevel;
        levelSelect.value = defaultLevel;
      } catch {}
    }

    async function loadMappings() {
      try {
        const res = await fetch(`/api/mappings?project=${encodeURIComponent(project)}`);
        if (!res.ok) return;
        mappings = await res.json();
      } catch {}
    }

    function showFloorPlan(imagePath) {
      floorPlanImg.src = `/api/2d/image?file=${encodeURIComponent(imagePath)}`;
      floorPlanImg.onload = () => {
        mapPlaceholder.style.display = "none";
        mapContainer.style.display = "inline-block";
        renderPins();
      };
      floorPlanImg.onerror = () => {
        mapPlaceholder.innerHTML = '<div class="placeholder-icon">&#128247;</div><p style="color:#f85149">Failed to load floor plan</p>';
      };
    }

    function renderPins() {
      mapContainer.querySelectorAll(".pin").forEach((el) => el.remove());

      // Filter pins to only those matching the current level
      const prefix = `${project}/${currentLevel}/`;
      const visiblePins = mappings.pins.filter((p) => p.image360.startsWith(prefix));

      visiblePins.forEach((pin) => {
        const el = document.createElement("div");
        el.className = "pin";
        el.style.left = (pin.x * 100) + "%";
        el.style.top = (pin.y * 100) + "%";

        const displayName = pin.image360.split("/").pop();
        el.innerHTML = `<div class="pin-tooltip">${displayName}</div>`;

        el.addEventListener("click", (e) => {
          e.stopPropagation();
          openViewer(pin.image360, displayName);
        });

        mapContainer.appendChild(el);
      });
    }

    levelSelect.addEventListener("change", () => {
      currentLevel = levelSelect.value;
      resetZoom();
      refreshFloorPlanDisplay();
    });

    // ---- Zoom + pan ----
    const mapArea = document.getElementById("mapArea");
    const zoomIndicator = document.getElementById("zoomIndicator");
    let scale = 1;
    let tx = 0, ty = 0;
    const MIN_SCALE = 1;
    const MAX_SCALE = 8;
    let zoomIndicatorTimer = null;

    function applyTransform() {
      mapContainer.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
      mapArea.classList.toggle("zoomed", scale > 1);
    }

    function resetZoom() {
      scale = 1;
      tx = 0;
      ty = 0;
      applyTransform();
    }

    function showZoomIndicator() {
      zoomIndicator.textContent = Math.round(scale * 100) + "%";
      zoomIndicator.classList.add("visible");
      clearTimeout(zoomIndicatorTimer);
      zoomIndicatorTimer = setTimeout(() => zoomIndicator.classList.remove("visible"), 1000);
    }

    mapArea.addEventListener("wheel", (e) => {
      if (mapContainer.style.display === "none") return;
      e.preventDefault();
      // Compute cursor position relative to the UNtransformed mapContainer origin.
      // getBoundingClientRect returns the VISUAL (post-transform) box; its top-left
      // corresponds to the current (tx, ty) offset of transform-origin 0,0 element.
      const rect = mapContainer.getBoundingClientRect();
      const px = (e.clientX - rect.left) / scale;
      const py = (e.clientY - rect.top) / scale;
      const factor = Math.exp(-e.deltaY * 0.0015);
      const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * factor));
      // Shift tx/ty so the point under the cursor stays under the cursor
      tx += px * (scale - newScale);
      ty += py * (scale - newScale);
      scale = newScale;
      if (scale === 1) { tx = 0; ty = 0; }
      applyTransform();
      showZoomIndicator();
    }, { passive: false });

    // Pan when zoomed
    let panning = false;
    let panStartX = 0, panStartY = 0, panStartTx = 0, panStartTy = 0;

    mapArea.addEventListener("mousedown", (e) => {
      if (scale <= 1) return;
      if (e.target.closest(".pin") || e.target.closest(".menu-container")) return;
      panning = true;
      panStartX = e.clientX;
      panStartY = e.clientY;
      panStartTx = tx;
      panStartTy = ty;
      mapArea.classList.add("panning");
      e.preventDefault();
    });

    document.addEventListener("mousemove", (e) => {
      if (!panning) return;
      tx = panStartTx + (e.clientX - panStartX);
      ty = panStartTy + (e.clientY - panStartY);
      applyTransform();
    });

    document.addEventListener("mouseup", () => {
      if (!panning) return;
      panning = false;
      mapArea.classList.remove("panning");
    });

    // Double-click to reset zoom
    mapArea.addEventListener("dblclick", (e) => {
      if (e.target.closest(".pin")) return;
      resetZoom();
      showZoomIndicator();
    });

    // Full screen 360 viewer
    function openViewer(image360, displayName) {
      modalTitle.textContent = displayName;
      viewerModal.classList.add("visible");
      modalLoading.classList.remove("hidden");

      if (viewer) {
        try { viewer.destroy(); } catch {}
        viewer = null;
      }

      viewer = pannellum.viewer("pano360", {
        type: "equirectangular",
        panorama: `/api/image?file=${encodeURIComponent(image360)}`,
        autoLoad: true,
        compass: true,
        showControls: true,
        mouseZoom: true,
        autoRotate: -2,
        loadedCallback: () => modalLoading.classList.add("hidden"),
      });

      setTimeout(() => modalLoading.classList.add("hidden"), 8000);
    }

    function closeViewer() {
      viewerModal.classList.remove("visible");
      if (viewer) {
        try { viewer.destroy(); } catch {}
        viewer = null;
      }
    }

    closeBtn.addEventListener("click", closeViewer);

    // ESC closes the modal
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && viewerModal.classList.contains("visible")) {
        closeViewer();
      }
    });
  </script>
</body>
</html>
