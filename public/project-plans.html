<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plans — GT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app.css">
  <script src="/me.js"></script>
  <style>
    .project-headline {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    @media (max-width: 640px) {
      .header-inner { flex-wrap: wrap; row-gap: 4px; }
      .project-headline {
        order: 3; flex-basis: 100%;
        font-size: 0.85rem; color: var(--ink-muted);
        padding-top: 4px; border-top: 1px solid var(--line);
      }
    }

    .page-head { margin-bottom: var(--space-md); display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-sm); flex-wrap: wrap; }
    .page-head h1 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(1.5rem, 3vw, 1.875rem);
      letter-spacing: -0.02em;
      margin: 0;
    }

    .plans-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
    }
    @media (min-width: 640px) { .plans-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 980px) { .plans-grid { grid-template-columns: repeat(3, 1fr); } }

    .plan-card {
      background: var(--bg-elevated);
      display: flex;
      flex-direction: column;
      transition: background var(--transition);
    }

    /* Placeholder thumbnail — subtle tinted panel with a document icon */
    .plan-card-thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: linear-gradient(145deg, #e8e4dd 0%, #d4cfc3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      color: var(--ink-muted);
      border-bottom: 1px solid var(--line);
      position: relative;
      overflow: hidden;
    }
    .plan-card-thumb.placeholder::after {
      /* Subtle wireframe overlay — only on the placeholder style */
      content: "";
      position: absolute;
      inset: 12%;
      border: 1px solid rgba(13, 13, 13, 0.12);
      transform: rotate(3deg);
    }
    .plan-card-thumb.placeholder::before {
      content: "";
      position: absolute;
      inset: 18%;
      border: 1px solid rgba(13, 13, 13, 0.08);
      transform: rotate(-4deg);
    }
    .plan-card-thumb .glyph {
      position: relative;
      z-index: 1;
    }
    .plan-card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .plan-card-body {
      padding: var(--space-md);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .plan-card-name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: -0.01em;
      color: var(--ink);
      word-break: break-word;
    }
    .plan-card-meta {
      font-size: 0.75rem;
      color: var(--ink-muted);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .plan-card-meta span:first-child { color: var(--ink); font-weight: 500; }

    .plan-card-actions {
      margin-top: auto;
      padding-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .plan-card-actions .btn-danger {
      color: var(--danger);
      border-color: var(--danger);
    }
    .plan-card-actions .btn-danger:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }

    .placeholder {
      text-align: center;
      padding: var(--space-2xl) var(--space-md);
      color: var(--ink-subtle);
      border: 1px solid var(--line);
      background: var(--bg-elevated);
    }
    .placeholder .placeholder-icon { font-size: 2.5rem; margin-bottom: var(--space-sm); }
    .error-msg { color: var(--danger); padding: var(--space-md); background: var(--danger-bg); border: 1px solid var(--danger); }

    /* Thumbnail is clickable for previewable types */
    .plan-card-thumb.previewable { cursor: zoom-in; }
    .plan-card-thumb.previewable:hover::after,
    .plan-card-thumb.previewable:hover::before { opacity: 0.8; }

    /* Full-screen PDF / image viewer modal */
    .pdf-modal {
      position: fixed;
      inset: 0;
      background: var(--ink);
      z-index: 1000;
      display: none;
      flex-direction: column;
    }
    .pdf-modal.visible { display: flex; }
    .pdf-modal-bar {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      flex-shrink: 0;
    }
    .pdf-modal-title {
      flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-size: 0.85rem; letter-spacing: 0.04em;
    }
    .pdf-modal-download, .pdf-modal-close {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 0.4rem 0.75rem;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .pdf-modal-download:hover, .pdf-modal-close:hover {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    .pdf-modal-close { width: 36px; padding: 0.4rem; font-size: 1.1rem; }
    .pdf-modal-body { flex: 1; display: flex; align-items: center; justify-content: center; background: #3b4048; min-height: 0; }
    .pdf-modal-body iframe {
      width: 100%; height: 100%; border: 0; background: #fff;
    }
    .pdf-modal-body img {
      max-width: 100%; max-height: 100%; object-fit: contain;
    }
    .pdf-modal-body .no-preview {
      text-align: center; color: rgba(255, 255, 255, 0.8);
      padding: var(--space-lg);
      font-size: 0.95rem;
    }
    .pdf-modal-body .no-preview p { margin: 0 0 var(--space-md); }
    .pdf-modal-loading {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/">
        <img class="logo__mark" src="https://gt3d.com/images/logo-mark.svg" alt="" width="36" height="36" decoding="async">
        Ground Truth <span>3D</span>
      </a>
      <a class="project-headline" id="projectHeadline" href="#">Plans</a>
      <nav class="nav-primary" aria-label="Primary">
        <a class="nav-map" href="#">Map</a>
        <a class="nav-images" href="#">2D Images</a>
        <a class="nav-plans" href="#">2D Plans</a>
        <a class="nav-models" href="#">3D Models</a>
        <a class="nav-pointclouds" href="#">Point Clouds</a>
        <a href="https://gt3d.com" target="_blank" rel="noopener">GT3D Home</a>
      </nav>
      <button class="menu-toggle mobile-only" id="menuBtn" aria-label="Menu" aria-expanded="false" aria-controls="menuDropdown">
        <span class="bar"></span>
      </button>
    </div>
    <div class="dropdown-panel" id="menuDropdown">
      <div class="dropdown-inner">
        <a class="nav-map" href="#">Map</a>
        <a class="nav-images" href="#">2D Images</a>
        <a class="nav-plans" href="#">2D Plans</a>
        <a class="nav-models" href="#">3D Models</a>
        <a class="nav-pointclouds" href="#">Point Clouds</a>
        <a href="https://gt3d.com" target="_blank" rel="noopener">GT3D Home</a>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="page-head">
      <h1>Plans</h1>
      <a href="#" class="link-action" id="adminUploadLink" style="display:none;">+ Upload plan</a>
    </div>

    <div id="modelsWrap">
      <div class="placeholder">
        <p>Loading…</p>
      </div>
    </div>
  </main>

  <!-- Full-screen PDF / image viewer modal -->
  <div class="pdf-modal" id="pdfModal" role="dialog" aria-modal="true">
    <div class="pdf-modal-bar">
      <span class="pdf-modal-title" id="pdfTitle"></span>
      <a class="pdf-modal-download" id="pdfDownload" href="#" download>Download</a>
      <button class="pdf-modal-close" id="pdfClose" aria-label="Close">&times;</button>
    </div>
    <div class="pdf-modal-body" id="pdfBody"></div>
  </div>

  <script>
    // Extract project from URL: /plans/<project-name>
    let project = null;
    const pathMatch = window.location.pathname.match(/^\/plans\/(.+?)\/?$/);
    if (pathMatch) project = decodeURIComponent(pathMatch[1]);

    const wrap = document.getElementById("modelsWrap");
    const projectHeadline = document.getElementById("projectHeadline");

    if (!project) {
      wrap.innerHTML = '<div class="error-msg">No project specified. URL should be /plans/&lt;project-name&gt;.</div>';
    } else {
      projectHeadline.textContent = project;
      const enc = encodeURIComponent(project);
      // Default to the no-IAP /public/ mirror for anonymous viewers; the
      // editor IIFE below overrides to /<project> for editors.
      projectHeadline.href = `/public/${enc}`;
      // Standard viewer nav links — class-based selectors wire both the
      // desktop nav and the mobile dropdown in one pass.
      document.querySelectorAll(".nav-map").forEach((a) => a.href = `/map-viewer/${enc}`);
      document.querySelectorAll(".nav-images").forEach((a) => a.href = `/images/${enc}`);
      document.querySelectorAll(".nav-plans").forEach((a) => a.href = `/plans/${enc}`);
      document.querySelectorAll(".nav-models").forEach((a) => a.href = `/models/${enc}`);
      document.querySelectorAll(".nav-pointclouds").forEach((a) => a.href = `/pointclouds/${enc}`);

      // Admin "+ Upload plan" shortcut when applicable; also re-route the
      // GT3D logo home target to the current project home page for
      // non-editors so it stays within the public project context. For
      // editors, swap to the shared editor-nav hamburger cluster.
      (async () => {
        const isEditor = window.me ? await window.me.canEdit(project) : false;
        if (window.me && await window.me.isAdmin()) {
          const a = document.getElementById("adminUploadLink");
          a.href = `/plan-upload.html?project=${encodeURIComponent(project)}`;
          a.style.display = "";
        }
        if (!isEditor) {
          const logo = document.querySelector(".site-header .logo");
          // Non-editors land on the no-IAP /public/<project> mirror so the
          // logo is a working "back to project home" link for anonymous
          // viewers (the previous /<project> target hits IAP and bounces).
          if (logo) logo.href = `/public/${encodeURIComponent(project)}`;
        } else {
          document.body.classList.add("editor-nav");
          // Editors get the editable home at /<project>.
          if (projectHeadline) projectHeadline.href = `/${enc}`;
          const isAdminUser = window.me ? !!(await window.me.isAdmin()) : false;
          const editProjectItem = isAdminUser
            ? `<a href="/edit-project.html?project=${enc}">Edit Project Information</a>`
            : "";
          const dd = document.querySelector("#menuDropdown .dropdown-inner");
          if (dd) {
            dd.innerHTML = `
              <a href="/map-viewer/${enc}">Map</a>
              <a href="/images/${enc}">2D Images</a>
              <a href="/plans/${enc}">2D Plans</a>
              <a href="/models/${enc}">Models</a>
              <a href="/documents/${enc}">Documents</a>
              <a href="/video-upload.html?project=${enc}">Videos</a>
              <a href="/users.html">Users</a>
              ${editProjectItem}
              <a href="/${enc}">Project Home</a>
            `;
          }
        }
      })();

      loadPlans(project);
    }

    function formatSize(bytes) {
      if (!bytes && bytes !== 0) return "";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(2) + " MB";
      return (bytes / 1024 / 1024 / 1024).toFixed(2) + " GB";
    }

    function formatDate(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    function getExt(name) {
      const i = name.lastIndexOf(".");
      return i >= 0 ? name.slice(i + 1).toLowerCase() : "";
    }
    function isPdf(f) {
      return (f.contentType || "").toLowerCase() === "application/pdf" || getExt(f.name) === "pdf";
    }
    function isImage(f) {
      if ((f.contentType || "").startsWith("image/")) return true;
      return ["png", "jpg", "jpeg", "gif", "webp", "bmp", "svg"].includes(getExt(f.name));
    }
    function canPreview(f) {
      return isPdf(f) || isImage(f);
    }

    async function loadPlans(project) {
      try {
        const res = await fetch(`/api/plan/files?project=${encodeURIComponent(project)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const files = await res.json();

        if (files.length === 0) {
          wrap.innerHTML = '<div class="placeholder"><div class="placeholder-icon">&#128196;</div><p>No plans uploaded for this project yet.</p></div>';
          return;
        }

        // Sort newest first
        files.sort((a, b) => (b.updated || "").localeCompare(a.updated || ""));

        const grid = document.createElement("div");
        grid.className = "plans-grid";

        files.forEach((f) => {
          const card = document.createElement("div");
          card.className = "plan-card";
          const previewable = canPreview(f);
          const thumbClass = "plan-card-thumb" + (previewable ? " previewable" : "");
          const thumbHtml = f.thumbnail
            ? `<div class="${thumbClass}" data-file="${escapeAttr(f.name)}" data-display="${escapeAttr(f.displayName)}"><img src="/api/plan/thumbnail?file=${encodeURIComponent(f.thumbnail)}" alt="${escapeAttr(f.displayName)}" loading="lazy" onerror="this.parentElement.classList.add('placeholder'); this.outerHTML='&lt;span class=&quot;glyph&quot;&gt;&amp;#128196;&lt;/span&gt;'"></div>`
            : `<div class="${thumbClass} placeholder" data-file="${escapeAttr(f.name)}" data-display="${escapeAttr(f.displayName)}"><span class="glyph">&#128196;</span></div>`;
          card.innerHTML = `
            ${thumbHtml}
            <div class="plan-card-body">
              <div class="plan-card-name" title="${escapeHtml(f.displayName)}">${escapeHtml(f.displayName)}</div>
              <div class="plan-card-meta">
                <span>${formatDate(f.updated)}</span>
                <span>${formatSize(f.size)}</span>
              </div>
              <div class="plan-card-actions">
                <button class="btn btn-outline btn-sm download-btn" data-file="${escapeAttr(f.name)}">Download</button>
                <button class="btn btn-outline btn-sm btn-danger delete-btn editor-only" data-file="${escapeAttr(f.name)}" data-display="${escapeAttr(f.displayName)}" style="display:none;">Delete</button>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });

        // Clicking a previewable thumbnail opens the PDF/image modal
        grid.querySelectorAll(".plan-card-thumb.previewable").forEach((el) => {
          el.addEventListener("click", () => {
            openPreview(el.dataset.file, el.dataset.display);
          });
        });

        wrap.innerHTML = "";
        wrap.appendChild(grid);

        grid.querySelectorAll(".download-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            btn.disabled = true;
            const orig = btn.textContent;
            btn.textContent = "Preparing…";
            try {
              const r = await fetch(`/api/plan/download-url?file=${encodeURIComponent(btn.dataset.file)}`);
              if (!r.ok) throw new Error(`HTTP ${r.status}`);
              const { downloadUrl } = await r.json();
              window.location.href = downloadUrl;
              setTimeout(() => { btn.disabled = false; btn.textContent = orig; }, 2000);
            } catch (err) {
              alert("Download failed: " + err.message);
              btn.disabled = false;
              btn.textContent = orig;
            }
          });
        });

        grid.querySelectorAll(".delete-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const name = btn.dataset.display;
            if (!confirm(`Delete "${name}"? This also removes its thumbnail. This cannot be undone.`)) return;
            btn.disabled = true;
            const orig = btn.textContent;
            btn.textContent = "Deleting…";
            try {
              const r = await fetch("/api/plan/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ file: btn.dataset.file }),
              });
              if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || `HTTP ${r.status}`);
              loadPlans(project);
            } catch (err) {
              alert("Delete failed: " + err.message);
              btn.disabled = false;
              btn.textContent = orig;
            }
          });
        });

        // Reveal editor-only controls (Delete button) when the visitor can edit
        if (window.me && await window.me.canEdit(project)) {
          grid.querySelectorAll(".editor-only").forEach((el) => { el.style.display = ""; });
        }
      } catch (err) {
        wrap.innerHTML = `<div class="error-msg">${escapeHtml(err.message)}</div>`;
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }
    function escapeAttr(s) { return escapeHtml(s); }

    // Mobile hamburger menu — toggle, click-outside, and Escape to close
    (function () {
      const btn = document.getElementById("menuBtn");
      const panel = document.getElementById("menuDropdown");
      if (!btn || !panel) return;
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const open = panel.classList.toggle("is-open");
        btn.setAttribute("aria-expanded", open);
      });
      document.addEventListener("click", (e) => {
        if (!e.target.closest("#menuDropdown") && !e.target.closest("#menuBtn")) {
          panel.classList.remove("is-open");
          btn.setAttribute("aria-expanded", "false");
        }
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          panel.classList.remove("is-open");
          btn.setAttribute("aria-expanded", "false");
        }
      });
    })();

    // ---- PDF / image preview modal ----
    const pdfModal = document.getElementById("pdfModal");
    const pdfBody = document.getElementById("pdfBody");
    const pdfTitle = document.getElementById("pdfTitle");
    const pdfClose = document.getElementById("pdfClose");
    const pdfDownload = document.getElementById("pdfDownload");

    async function openPreview(filePath, displayName) {
      pdfTitle.textContent = displayName;
      pdfBody.innerHTML = '<div class="pdf-modal-loading">Loading…</div>';
      pdfModal.classList.add("visible");
      document.body.style.overflow = "hidden";

      try {
        const res = await fetch(`/api/plan/view-url?file=${encodeURIComponent(filePath)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const { viewUrl } = await res.json();

        const ext = filePath.split(".").pop().toLowerCase();
        const isImg = ["png", "jpg", "jpeg", "gif", "webp", "bmp", "svg"].includes(ext);
        if (ext === "pdf") {
          pdfBody.innerHTML = `<iframe src="${escapeAttr(viewUrl)}#toolbar=1&navpanes=0" title="${escapeAttr(displayName)}"></iframe>`;
        } else if (isImg) {
          pdfBody.innerHTML = `<img src="${escapeAttr(viewUrl)}" alt="${escapeAttr(displayName)}">`;
        } else {
          pdfBody.innerHTML = `<div class="no-preview"><p>This file type can\u2019t be previewed in the browser.</p><a class="pdf-modal-download" href="${escapeAttr(viewUrl)}" download>Download instead</a></div>`;
        }

        // Also set the Download button href to a proper attachment URL
        try {
          const dl = await fetch(`/api/plan/download-url?file=${encodeURIComponent(filePath)}`);
          if (dl.ok) {
            const { downloadUrl } = await dl.json();
            pdfDownload.href = downloadUrl;
          } else {
            pdfDownload.href = viewUrl;
          }
        } catch {
          pdfDownload.href = viewUrl;
        }
      } catch (err) {
        pdfBody.innerHTML = `<div class="no-preview"><p>Failed to load preview: ${escapeHtml(err.message)}</p></div>`;
      }
    }

    function closePreview() {
      pdfModal.classList.remove("visible");
      pdfBody.innerHTML = "";
      document.body.style.overflow = "";
    }

    pdfClose.addEventListener("click", closePreview);
    pdfModal.addEventListener("click", (e) => {
      // Click on the modal backdrop (not on bar or body content) closes it
      if (e.target === pdfModal) closePreview();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && pdfModal.classList.contains("visible")) closePreview();
    });
  </script>
</body>
</html>
