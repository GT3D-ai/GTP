<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTP Home — Ground Truth Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app.css">
  <script src="/me.js"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .landing-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg) var(--space-md);
    }
    .landing {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }
    .landing-mark {
      width: 64px;
      height: 64px;
      margin: 0 auto var(--space-md);
      display: block;
    }
    .landing h1 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      letter-spacing: -0.02em;
      margin: 0 0 var(--space-md);
      color: var(--ink);
    }
    .landing p {
      font-size: 1.0625rem;
      line-height: 1.55;
      color: var(--ink-muted);
      margin: 0 0 var(--space-md);
    }
    .landing .actions {
      margin-top: var(--space-lg);
    }
    .contact-form .field { text-align: left; margin-bottom: var(--space-sm); }
    .contact-form .field-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 4px;
    }
    .contact-form input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--line-strong);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      outline: none;
      transition: border-color var(--transition);
    }
    .contact-form input:focus { border-color: var(--accent); }
    /* Honeypot — invisible to humans, baited for spambots */
    .hp-field {
      position: absolute !important;
      left: -9999px !important;
      width: 1px !important;
      height: 1px !important;
      overflow: hidden !important;
    }
    .modal-actions {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-md);
    }
    .modal-actions .btn-primary { flex: 1; }
    .platform-footer {
      text-align: center;
      padding: var(--space-md);
      font-size: 0.78rem;
      color: var(--ink-subtle);
      border-top: 1px solid var(--line);
    }
    .platform-footer a { color: var(--ink-muted); text-decoration: none; }
    .platform-footer a:hover { color: var(--ink); }
  </style>
</head>
<body>
  <main class="landing-wrap">
    <div class="landing">
      <img class="landing-mark" src="https://gt3d.com/images/logo-mark.svg" alt="" decoding="async">
      <h1>GTP Home</h1>
      <p>The Ground Truth Platform (GTP) is an online resource for viewing and sharing project information including 360 images, 2D images, plans and 3D models.</p>
      <p>Contact us to request access</p>
      <div class="actions">
        <button type="button" class="btn btn-primary" id="contactBtn">Contact us</button>
      </div>
    </div>
  </main>

  <footer class="platform-footer">
    <a href="https://gt3d.com" target="_blank" rel="noopener">Ground Truth 3D</a>
  </footer>

  <!-- Contact / access-request modal -->
  <div class="overlay" id="contactOverlay" role="dialog" aria-modal="true" aria-labelledby="contactModalTitle">
    <div class="modal">
      <h3 id="contactModalTitle">Request access</h3>
      <form class="contact-form" id="contactForm" novalidate>
        <div class="field">
          <label class="field-label" for="contactName">Name <span class="required-mark">*</span></label>
          <input type="text" id="contactName" name="name" autocomplete="name" required>
        </div>
        <div class="field">
          <label class="field-label" for="contactCompany">Company <span class="required-mark">*</span></label>
          <input type="text" id="contactCompany" name="company" autocomplete="organization" required>
        </div>
        <div class="field">
          <label class="field-label" for="contactEmail">Email <span class="required-mark">*</span></label>
          <input type="email" id="contactEmail" name="email" autocomplete="email" required>
        </div>
        <!-- Honeypot — only bots fill this -->
        <div class="hp-field" aria-hidden="true">
          <label>Website<input type="text" id="contactHoneypot" name="website" autocomplete="off" tabindex="-1"></label>
        </div>
        <div class="status-message" id="contactStatus"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="contactCancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="contactSubmit">Send Request</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Authorized users (admins / editors / viewers in the gt3d.com Workspace)
    // get auto-forwarded to the project list. Anonymous visitors stay on this
    // landing page and can submit the contact form.
    if (window.me) {
      window.me.getMe().then((profile) => {
        if (profile && profile.authorized) {
          window.location.replace("/projects");
        }
      });
    }

    const overlay = document.getElementById("contactOverlay");
    const form = document.getElementById("contactForm");
    const submitBtn = document.getElementById("contactSubmit");
    const cancelBtn = document.getElementById("contactCancel");
    const status = document.getElementById("contactStatus");
    const contactBtn = document.getElementById("contactBtn");
    const nameInput = document.getElementById("contactName");
    const companyInput = document.getElementById("contactCompany");
    const emailInput = document.getElementById("contactEmail");

    function openContact() {
      status.className = "status-message";
      status.textContent = "";
      submitBtn.disabled = false;
      submitBtn.textContent = "Send Request";
      overlay.classList.add("visible");
      setTimeout(() => nameInput.focus(), 0);
    }
    function closeContact() {
      overlay.classList.remove("visible");
      form.reset();
    }

    contactBtn.addEventListener("click", openContact);
    cancelBtn.addEventListener("click", closeContact);
    overlay.addEventListener("click", (e) => { if (e.target === overlay) closeContact(); });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && overlay.classList.contains("visible")) closeContact();
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();
      const company = companyInput.value.trim();
      const email = emailInput.value.trim();
      const website = document.getElementById("contactHoneypot").value;

      if (!name) { status.className = "status-message visible error"; status.textContent = "Name is required."; return; }
      if (!company) { status.className = "status-message visible error"; status.textContent = "Company is required."; return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        status.className = "status-message visible error"; status.textContent = "Please enter a valid email address."; return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Sending…";
      status.className = "status-message";
      status.textContent = "";

      try {
        const res = await fetch("/api/contact-request", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, company, email, website }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);

        status.className = "status-message visible success";
        status.textContent = "Thanks — we'll be in touch.";
        setTimeout(closeContact, 1800);
      } catch (err) {
        status.className = "status-message visible error";
        status.textContent = err.message || "Something went wrong. Please try again.";
        submitBtn.disabled = false;
        submitBtn.textContent = "Send Request";
      }
    });
  </script>
</body>
</html>
