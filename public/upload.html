<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload 360 Photos — GT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app.css">
  <style>
    #fileInput { display: none; }
    .file-entry-icon { color: var(--ink-subtle); font-size: 1rem; flex-shrink: 0; }
    .file-entry-info { flex: 1; min-width: 0; }
    .file-list-wrap { display: none; margin-top: var(--space-sm); }
    .file-list-wrap.visible { display: block; }
    .clear-all { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 0; }
    .clear-all:hover { text-decoration: underline; }
    .progress-container { display: none; margin-top: var(--space-sm); }
    .progress-container.visible { display: block; }
    .upload-btn-wrap { display: none; margin-top: var(--space-md); }
    .upload-btn-wrap.visible { display: block; }
    .form-head h2 { font-family: var(--font-display); font-weight: 600; font-size: clamp(1.375rem, 2.5vw, 1.75rem); letter-spacing: -0.02em; margin: 0 0 0.5rem; }
    .form-head p.lede { margin-bottom: var(--space-lg); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/">
        <img class="logo__mark" src="https://gt3d.com/images/logo-mark.svg" alt="" width="36" height="36" decoding="async">
        Ground Truth <span>3D</span>
      </a>
      <nav class="nav-primary" aria-label="Primary">
        <a href="/">Projects</a>
        <a id="viewerLink" href="/viewer.html">360 Viewer</a>
      </nav>
    </div>
  </header>

  <main class="container-sm">
    <div class="form-head">
      <p class="eyebrow">Upload</p>
      <h2>Upload 360 photos</h2>
      <p class="lede">Drag and drop panoramic images to upload directly to the project's 360 photo bucket.</p>
    </div>

    <div class="field">
      <label class="field-label" for="projectName">Project Name <span class="required-mark">*</span></label>
      <input class="field-input" type="text" id="projectName" placeholder="Enter project name">
    </div>

    <div id="levelField" class="field">
      <label class="field-label" for="levelSelect">Level</label>
      <select class="field-select" id="levelSelect">
        <option value="">Loading…</option>
      </select>
      <input class="field-input" type="text" id="newLevelName" placeholder="Enter new level name" style="display:none; margin-top:8px;">
    </div>

    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-icon">&#128193;</div>
      <p>Drag & drop files here, or <strong>browse</strong></p>
    </div>
    <input type="file" id="fileInput" multiple>

    <div class="file-list-wrap" id="fileList">
      <div class="file-list-header">
        <span id="fileCount">0 files selected</span>
        <button class="clear-all" id="clearAll">Clear all</button>
      </div>
      <div id="fileEntries"></div>
    </div>

    <div class="upload-btn-wrap" id="uploadBtnWrap">
      <button class="btn btn-primary btn-block" id="uploadBtn">Upload to GCS</button>
    </div>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
    </div>

    <div class="status-message" id="statusMessage"></div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const projectFromUrl = params.get("project");
    const levelFromUrl = params.get("level");

    const projectNameEl = document.getElementById("projectName");
    const viewerLink = document.getElementById("viewerLink");

    if (projectFromUrl) {
      projectNameEl.value = projectFromUrl;
      projectNameEl.readOnly = true;
      let vLink = `/viewer.html?project=${encodeURIComponent(projectFromUrl)}`;
      if (levelFromUrl) vLink += `&level=${encodeURIComponent(levelFromUrl)}`;
      viewerLink.href = vLink;
    }

    const levelSelect = document.getElementById("levelSelect");
    const newLevelNameEl = document.getElementById("newLevelName");

    function getSelectedLevel() {
      if (levelSelect.value === "__new__") return newLevelNameEl.value.trim();
      return levelSelect.value;
    }

    async function loadLevelDropdown() {
      const project = projectNameEl.value.trim();
      if (!project) {
        levelSelect.innerHTML = '<option value="">Enter a project name first</option>';
        return;
      }
      try {
        const res = await fetch(`/api/levels?project=${encodeURIComponent(project)}`);
        if (!res.ok) throw new Error();
        const levels = await res.json();
        levelSelect.innerHTML = '<option value="">(No level)</option>';
        levels.forEach((lvl) => {
          const opt = document.createElement("option");
          opt.value = lvl;
          opt.textContent = lvl;
          levelSelect.appendChild(opt);
        });
        const addOpt = document.createElement("option");
        addOpt.value = "__new__";
        addOpt.textContent = "+ Add New Level";
        levelSelect.appendChild(addOpt);
        if (levelFromUrl) {
          levelSelect.value = levelFromUrl;
          if (levelSelect.value !== levelFromUrl) {
            const opt = document.createElement("option");
            opt.value = levelFromUrl;
            opt.textContent = levelFromUrl;
            levelSelect.insertBefore(opt, addOpt);
            levelSelect.value = levelFromUrl;
          }
        }
      } catch {
        levelSelect.innerHTML = '<option value="">(No level)</option><option value="__new__">+ Add New Level</option>';
      }
    }

    levelSelect.addEventListener("change", () => {
      if (levelSelect.value === "__new__") {
        newLevelNameEl.style.display = "block";
        newLevelNameEl.focus();
      } else {
        newLevelNameEl.style.display = "none";
        newLevelNameEl.value = "";
      }
    });

    projectNameEl.addEventListener("blur", loadLevelDropdown);
    loadLevelDropdown();

    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const fileListEl = document.getElementById("fileList");
    const fileEntries = document.getElementById("fileEntries");
    const fileCount = document.getElementById("fileCount");
    const clearAll = document.getElementById("clearAll");
    const uploadBtn = document.getElementById("uploadBtn");
    const uploadBtnWrap = document.getElementById("uploadBtnWrap");
    const progressContainer = document.getElementById("progressContainer");
    const progressFill = document.getElementById("progressFill");
    const progressText = document.getElementById("progressText");
    const statusMessage = document.getElementById("statusMessage");

    let selectedFiles = [];

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(2) + " MB";
    }

    function renderFileList() {
      fileEntries.innerHTML = "";
      selectedFiles.forEach((file, i) => {
        const entry = document.createElement("div");
        entry.className = "file-entry";
        entry.innerHTML = `
          <span class="file-entry-icon">&#128196;</span>
          <div class="file-entry-info">
            <div class="file-entry-name" title="${file.name}">${file.name}</div>
            <div class="file-entry-size">${formatSize(file.size)}</div>
          </div>
          <span class="file-entry-status pending" id="file-status-${i}">Pending</span>
          <button class="icon-btn" data-index="${i}" title="Remove">&times;</button>
        `;
        fileEntries.appendChild(entry);
      });
      fileCount.textContent = `${selectedFiles.length} file${selectedFiles.length !== 1 ? "s" : ""} selected`;
      fileListEl.classList.toggle("visible", selectedFiles.length > 0);
      uploadBtnWrap.classList.toggle("visible", selectedFiles.length > 0);
    }

    function addFiles(files) {
      const existing = new Set(selectedFiles.map((f) => f.name + f.size));
      for (const file of files) {
        if (!existing.has(file.name + file.size)) selectedFiles.push(file);
      }
      statusMessage.classList.remove("visible");
      progressContainer.classList.remove("visible");
      renderFileList();
    }

    function clearFiles() {
      selectedFiles = [];
      fileInput.value = "";
      fileListEl.classList.remove("visible");
      uploadBtnWrap.classList.remove("visible");
      statusMessage.classList.remove("visible");
      progressContainer.classList.remove("visible");
    }

    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      if (e.dataTransfer.files.length > 0) addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener("change", () => {
      if (fileInput.files.length > 0) { addFiles(fileInput.files); fileInput.value = ""; }
    });
    fileEntries.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-index]");
      if (btn) { selectedFiles.splice(parseInt(btn.dataset.index), 1); renderFileList(); }
    });
    clearAll.addEventListener("click", clearFiles);

    uploadBtn.addEventListener("click", async () => {
      if (selectedFiles.length === 0) return;
      if (!projectNameEl.value.trim()) {
        projectNameEl.focus();
        statusMessage.textContent = "Please enter a Project Name before uploading.";
        statusMessage.className = "status-message visible error";
        return;
      }
      if (levelSelect.value === "__new__" && !newLevelNameEl.value.trim()) {
        newLevelNameEl.focus();
        statusMessage.textContent = "Please enter a name for the new level.";
        statusMessage.className = "status-message visible error";
        return;
      }

      uploadBtn.disabled = true;
      uploadBtn.textContent = "Uploading…";
      statusMessage.classList.remove("visible");
      progressContainer.classList.add("visible");

      const project = projectNameEl.value.trim();
      const total = selectedFiles.length;
      let completed = 0, failed = 0;

      for (let i = 0; i < total; i++) {
        const file = selectedFiles[i];
        const statusEl = document.getElementById(`file-status-${i}`);
        statusEl.textContent = "Uploading";
        statusEl.className = "file-entry-status uploading";
        progressFill.style.width = ((i / total) * 100).toFixed(0) + "%";
        progressText.textContent = `Uploading ${i + 1} of ${total}…`;

        try {
          const result = await uploadSingleFile(file, project);
          if (result.success) { statusEl.textContent = "Done"; statusEl.className = "file-entry-status done"; completed++; }
          else { statusEl.textContent = "Failed"; statusEl.className = "file-entry-status failed"; failed++; }
        } catch {
          statusEl.textContent = "Failed"; statusEl.className = "file-entry-status failed"; failed++;
        }
      }

      progressFill.style.width = "100%";
      progressText.textContent = "Complete";

      if (failed === 0) {
        statusMessage.innerHTML = `<strong>${completed}</strong> file${completed !== 1 ? "s" : ""} uploaded to project <strong>${project}</strong>.`;
        statusMessage.className = "status-message visible success";
      } else {
        statusMessage.textContent = `${completed} uploaded, ${failed} failed.`;
        statusMessage.className = "status-message visible error";
      }
      uploadBtn.disabled = false;
      uploadBtn.textContent = "Upload to GCS";
    });

    async function uploadSingleFile(file, project) {
      const levelValue = getSelectedLevel();
      const res = await fetch("/api/upload-url", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          bucket: "360",
          project,
          level: levelValue || undefined,
          fileName: file.name,
          contentType: file.type || "application/octet-stream",
        }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `Failed to get upload URL (HTTP ${res.status})`);
      }
      const { uploadUrl, gcsPath } = await res.json();

      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("PUT", uploadUrl);
        xhr.setRequestHeader("Content-Type", file.type || "application/octet-stream");
        xhr.addEventListener("load", () => {
          if (xhr.status >= 200 && xhr.status < 300) resolve({ success: true, destName: gcsPath, fileName: file.name });
          else reject(new Error(`GCS upload failed (HTTP ${xhr.status})`));
        });
        xhr.addEventListener("error", () => reject(new Error("Network error")));
        xhr.send(file);
      });
    }
  </script>
</body>
</html>
