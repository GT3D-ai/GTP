<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload 2D Images — GT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app.css">
  <script src="/me.js"></script>
  <style>
    #fileInput { display: none; }
    .file-entry-icon { color: var(--ink-subtle); font-size: 1rem; flex-shrink: 0; }
    .file-entry-info { flex: 1; min-width: 0; }
    .file-list-wrap { display: none; margin-top: var(--space-sm); }
    .file-list-wrap.visible { display: block; }
    .clear-all { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 0; }
    .clear-all:hover { text-decoration: underline; }
    .progress-container { display: none; margin-top: var(--space-sm); }
    .progress-container.visible { display: block; }
    .upload-btn-wrap { display: none; margin-top: var(--space-md); }
    .upload-btn-wrap.visible { display: block; }
    .form-head h2 { font-family: var(--font-display); font-weight: 600; font-size: clamp(1.375rem, 2.5vw, 1.75rem); letter-spacing: -0.02em; margin: 0 0 0.5rem; }
    .form-head p.lede { margin-bottom: var(--space-lg); }

    .gallery-section { margin-top: var(--space-xl); }
    .gallery-header {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--ink-muted); margin-bottom: var(--space-sm);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
    }
    .gallery-item {
      background: var(--bg-elevated);
      overflow: hidden;
      transition: background var(--transition);
    }
    .gallery-item:hover { background: var(--bg); }
    .gallery-item img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
    .gallery-item-name {
      padding: 6px 10px; font-size: 0.75rem; color: var(--ink-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .gallery-empty {
      text-align: center; padding: var(--space-xl) var(--space-md);
      color: var(--ink-subtle); font-size: 0.9rem;
      background: var(--bg-elevated); border: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/">
        <img class="logo__mark" src="https://gt3d.com/images/logo-mark.svg" alt="" width="36" height="36" decoding="async">
        Ground Truth <span>3D</span>
      </a>
      <nav class="nav-primary" aria-label="Primary">
        <a href="/">Projects</a>
        <a id="imageViewerLink" href="/image-viewer.html">2D Viewer</a>
        <a id="viewerLink" href="/viewer.html">360 Viewer</a>
      </nav>
    </div>
  </header>

  <main class="container-sm">
    <div class="form-head">
      <p class="eyebrow">Upload</p>
      <h2>Upload 2D images</h2>
      <p class="lede">Floor plans, photos, sketches. Stored in the project's 2D image bucket.</p>
    </div>

    <div class="field">
      <label class="field-label" for="projectSelect">Project <span class="required-mark">*</span></label>
      <select class="field-select" id="projectSelect">
        <option value="">Select a project…</option>
      </select>
      <input class="field-input" type="text" id="newProjectName" placeholder="Enter new project name" style="display:none; margin-top:8px;">
    </div>

    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-icon">&#128444;</div>
      <p>Drag & drop images here, or <strong>browse</strong></p>
    </div>
    <input type="file" id="fileInput" multiple accept="image/*">

    <div class="file-list-wrap" id="fileList">
      <div class="file-list-header">
        <span id="fileCount">0 files selected</span>
        <button class="clear-all" id="clearAll">Clear all</button>
      </div>
      <div id="fileEntries"></div>
    </div>

    <div class="upload-btn-wrap" id="uploadBtnWrap">
      <button class="btn btn-primary btn-block" id="uploadBtn">Upload Images</button>
    </div>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
    </div>

    <div class="status-message" id="statusMessage"></div>

    <div class="gallery-section" id="gallerySection" style="display:none;">
      <div class="gallery-header">Project Images</div>
      <div id="galleryContent"></div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const projectFromUrl = params.get("project");

    const projectSelect = document.getElementById("projectSelect");
    const newProjectName = document.getElementById("newProjectName");
    const viewerLink = document.getElementById("viewerLink");

    async function loadProjectDropdown() {
      try {
        const res = await fetch("/api/projects");
        if (!res.ok) return;
        const projects = await res.json();
        projectSelect.innerHTML = '<option value="">Select a project…</option>';
        projects.forEach((name) => {
          const opt = document.createElement("option");
          opt.value = name; opt.textContent = name;
          projectSelect.appendChild(opt);
        });
        const newOpt = document.createElement("option");
        newOpt.value = "__new__"; newOpt.textContent = "+ Add New Project";
        projectSelect.appendChild(newOpt);

        if (projectFromUrl) {
          projectSelect.value = projectFromUrl;
          projectSelect.disabled = true;
          updateProjectLinks(projectFromUrl);
          loadGallery(projectFromUrl);
        }
      } catch {}
    }

    function updateProjectLinks(project) {
      viewerLink.href = `/viewer.html?project=${encodeURIComponent(project)}`;
      document.getElementById("imageViewerLink").href = `/image-viewer.html?project=${encodeURIComponent(project)}`;
    }

    function getSelectedProject() {
      if (projectSelect.value === "__new__") return newProjectName.value.trim();
      return projectSelect.value;
    }

    projectSelect.addEventListener("change", () => {
      if (projectSelect.value === "__new__") {
        newProjectName.style.display = "block";
        newProjectName.focus();
        document.getElementById("gallerySection").style.display = "none";
      } else if (projectSelect.value) {
        newProjectName.style.display = "none";
        newProjectName.value = "";
        updateProjectLinks(projectSelect.value);
        loadGallery(projectSelect.value);
      } else {
        newProjectName.style.display = "none";
        newProjectName.value = "";
        document.getElementById("gallerySection").style.display = "none";
      }
    });

    loadProjectDropdown();

    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const fileListEl = document.getElementById("fileList");
    const fileEntries = document.getElementById("fileEntries");
    const fileCount = document.getElementById("fileCount");
    const clearAllBtn = document.getElementById("clearAll");
    const uploadBtn = document.getElementById("uploadBtn");
    const uploadBtnWrap = document.getElementById("uploadBtnWrap");
    const progressContainer = document.getElementById("progressContainer");
    const progressFill = document.getElementById("progressFill");
    const progressText = document.getElementById("progressText");
    const statusMessage = document.getElementById("statusMessage");

    let selectedFiles = [];

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(2) + " MB";
    }

    function renderFileList() {
      fileEntries.innerHTML = "";
      selectedFiles.forEach((file, i) => {
        const entry = document.createElement("div");
        entry.className = "file-entry";
        entry.innerHTML = `
          <span class="file-entry-icon">&#128444;</span>
          <div class="file-entry-info">
            <div class="file-entry-name" title="${file.name}">${file.name}</div>
            <div class="file-entry-size">${formatSize(file.size)}</div>
          </div>
          <span class="file-entry-status pending" id="file-status-${i}">Pending</span>
          <button class="icon-btn" data-index="${i}" title="Remove">&times;</button>
        `;
        fileEntries.appendChild(entry);
      });
      fileCount.textContent = `${selectedFiles.length} file${selectedFiles.length !== 1 ? "s" : ""} selected`;
      fileListEl.classList.toggle("visible", selectedFiles.length > 0);
      uploadBtnWrap.classList.toggle("visible", selectedFiles.length > 0);
    }

    function addFiles(files) {
      const existing = new Set(selectedFiles.map((f) => f.name + f.size));
      for (const file of files) {
        if (!existing.has(file.name + file.size)) selectedFiles.push(file);
      }
      statusMessage.classList.remove("visible");
      progressContainer.classList.remove("visible");
      renderFileList();
    }

    function clearFiles() {
      selectedFiles = [];
      fileInput.value = "";
      fileListEl.classList.remove("visible");
      uploadBtnWrap.classList.remove("visible");
      statusMessage.classList.remove("visible");
      progressContainer.classList.remove("visible");
    }

    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      if (e.dataTransfer.files.length > 0) addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener("change", () => {
      if (fileInput.files.length > 0) { addFiles(fileInput.files); fileInput.value = ""; }
    });
    fileEntries.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-index]");
      if (btn) { selectedFiles.splice(parseInt(btn.dataset.index), 1); renderFileList(); }
    });
    clearAllBtn.addEventListener("click", clearFiles);

    uploadBtn.addEventListener("click", async () => {
      if (selectedFiles.length === 0) return;
      const project = getSelectedProject();
      if (!project) {
        if (projectSelect.value === "__new__") newProjectName.focus();
        else projectSelect.focus();
        statusMessage.textContent = "Please select or enter a Project Name before uploading.";
        statusMessage.className = "status-message visible error";
        return;
      }

      uploadBtn.disabled = true;
      uploadBtn.textContent = "Uploading…";
      statusMessage.classList.remove("visible");
      progressContainer.classList.add("visible");

      const total = selectedFiles.length;
      let completed = 0, failed = 0;

      for (let i = 0; i < total; i++) {
        const file = selectedFiles[i];
        const statusEl = document.getElementById(`file-status-${i}`);
        statusEl.textContent = "Uploading";
        statusEl.className = "file-entry-status uploading";
        progressFill.style.width = ((i / total) * 100).toFixed(0) + "%";
        progressText.textContent = `Uploading ${i + 1} of ${total}…`;

        try {
          const result = await uploadFile(file, project);
          if (result.success) { statusEl.textContent = "Done"; statusEl.className = "file-entry-status done"; completed++; }
          else { statusEl.textContent = "Failed"; statusEl.className = "file-entry-status failed"; failed++; }
        } catch {
          statusEl.textContent = "Failed"; statusEl.className = "file-entry-status failed"; failed++;
        }
      }

      progressFill.style.width = "100%";
      progressText.textContent = "Complete";

      if (failed === 0) {
        statusMessage.innerHTML = `<strong>${completed}</strong> image${completed !== 1 ? "s" : ""} uploaded to project <strong>${project}</strong>.`;
        statusMessage.className = "status-message visible success";
      } else {
        statusMessage.textContent = `${completed} uploaded, ${failed} failed.`;
        statusMessage.className = "status-message visible error";
      }

      uploadBtn.disabled = false;
      uploadBtn.textContent = "Upload Images";
      loadGallery(project);
    });

    async function uploadFile(file, project) {
      const res = await fetch("/api/upload-url", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          bucket: "2d",
          project,
          fileName: file.name,
          contentType: file.type || "application/octet-stream",
        }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `Failed to get upload URL (HTTP ${res.status})`);
      }
      const { uploadUrl, gcsPath } = await res.json();

      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("PUT", uploadUrl);
        xhr.setRequestHeader("Content-Type", file.type || "application/octet-stream");
        xhr.addEventListener("load", () => {
          if (xhr.status >= 200 && xhr.status < 300) resolve({ success: true, destName: gcsPath, fileName: file.name });
          else reject(new Error(`GCS upload failed (HTTP ${xhr.status})`));
        });
        xhr.addEventListener("error", () => reject(new Error("Network error")));
        xhr.send(file);
      });
    }

    async function loadGallery(project) {
      const section = document.getElementById("gallerySection");
      const content = document.getElementById("galleryContent");
      try {
        const res = await fetch(`/api/2d/files?project=${encodeURIComponent(project)}`);
        if (!res.ok) throw new Error("Failed to load");
        const files = await res.json();

        section.style.display = "block";
        if (files.length === 0) {
          content.innerHTML = '<div class="gallery-empty">No images uploaded yet</div>';
          return;
        }

        const grid = document.createElement("div");
        grid.className = "gallery-grid";
        files.forEach((file) => {
          const item = document.createElement("div");
          item.className = "gallery-item";
          item.innerHTML = `
            <img src="/api/2d/image?file=${encodeURIComponent(file.name)}" alt="${file.displayName}" loading="lazy">
            <div class="gallery-item-name" title="${file.displayName}">${file.displayName}</div>
          `;
          grid.appendChild(item);
        });
        content.innerHTML = "";
        content.appendChild(grid);
      } catch {
        section.style.display = "block";
        content.innerHTML = '<div class="gallery-empty" style="color:var(--danger)">Failed to load gallery</div>';
      }
    }
  </script>
</body>
</html>
