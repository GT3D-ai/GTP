<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos — GT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app.css">
  <script src="/me.js"></script>
  <style>
    /* Mirrors project-images.html — see that page for layout comments. */
    a.project-headline {
      display: block;
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-subtle);
      text-decoration: none;
      margin-bottom: 4px;
      overflow-wrap: anywhere;
    }
    a.project-headline:hover { color: var(--accent); }

    .page-head { margin-bottom: var(--space-md); display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-sm); flex-wrap: wrap; }
    .page-head h1 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(1.5rem, 3vw, 1.875rem);
      letter-spacing: -0.02em;
      margin: 0;
    }
    .page-head .head-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .videos-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
    }
    @media (min-width: 640px) { .videos-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 980px) { .videos-grid { grid-template-columns: repeat(3, 1fr); } }

    .video-card {
      background: var(--bg-elevated);
      display: flex;
      flex-direction: column;
      transition: background var(--transition);
      position: relative;
    }

    /* Videos don't have server-side thumbnails, so the card thumb is a
       solid placeholder with a centered video glyph. */
    .video-card-thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: linear-gradient(145deg, #e8e4dd 0%, #d4cfc3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-muted);
      border-bottom: 1px solid var(--line);
      position: relative;
      overflow: hidden;
    }
    .video-card-thumb svg { width: 64px; height: 64px; }

    .video-card-body {
      padding: var(--space-md);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .video-card-name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: -0.01em;
      color: var(--ink);
      word-break: break-word;
    }
    .video-card-name.editable {
      cursor: text;
      padding: 2px 4px;
      margin: -2px -4px;
      border-radius: 3px;
    }
    .video-card-name.editable:focus {
      outline: 2px solid var(--accent);
      background: var(--bg);
    }
    .video-card-meta {
      font-size: 0.75rem;
      color: var(--ink-muted);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .video-card-meta span:first-child { color: var(--ink); font-weight: 500; }

    .video-card-actions {
      margin-top: auto;
      padding-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .video-card-actions .btn-danger {
      color: var(--danger);
      border-color: var(--danger);
    }
    .video-card-actions .btn-danger:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }

    .placeholder {
      text-align: center;
      padding: var(--space-2xl) var(--space-md);
      color: var(--ink-subtle);
      border: 1px solid var(--line);
      background: var(--bg-elevated);
    }
    .placeholder .placeholder-icon { font-size: 2.5rem; margin-bottom: var(--space-sm); }
    .error-msg { color: var(--danger); padding: var(--space-md); background: var(--danger-bg); border: 1px solid var(--danger); }

    .not-admin {
      background: var(--warning-bg);
      border: 1px solid var(--accent);
      color: var(--ink);
      padding: var(--space-lg);
      text-align: center;
      font-size: 0.9rem;
    }
  </style>
</head>
<body class="category-page">
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/">
        <img class="logo__mark" src="https://gt3d.com/images/logo-mark.svg" alt="" width="36" height="36" decoding="async">
        Ground Truth <span>3D</span>
      </a>
      <nav class="nav-primary" aria-label="Primary">
        <a class="nav-map" href="#">Map</a>
        <a class="nav-images" href="#">2D Images</a>
        <a class="nav-plans" href="#">2D Plans</a>
        <a class="nav-models" href="#">3D Models</a>
        <a class="nav-pointclouds" href="#">Point Clouds</a>
        <a href="https://gt3d.com" target="_blank" rel="noopener">GT3D Home</a>
      </nav>
      <button class="menu-toggle mobile-only" id="menuBtn" aria-label="Menu" aria-expanded="false" aria-controls="menuDropdown">
        <span class="bar"></span>
      </button>
    </div>
    <div class="dropdown-panel" id="menuDropdown">
      <div class="dropdown-inner">
        <a class="nav-map" href="#">Map</a>
        <a class="nav-images" href="#">2D Images</a>
        <a class="nav-plans" href="#">2D Plans</a>
        <a class="nav-models" href="#">3D Models</a>
        <a class="nav-pointclouds" href="#">Point Clouds</a>
        <a href="https://gt3d.com" target="_blank" rel="noopener">GT3D Home</a>
      </div>
    </div>
  </header>

  <main class="container">
    <a class="project-headline" id="projectHeadline" href="#"></a>
    <div class="page-head">
      <h1>Videos</h1>
      <div class="head-actions">
        <a href="#" class="link-action" id="adminUploadLink" style="display:none;">+ Upload videos</a>
      </div>
    </div>

    <div id="videosWrap">
      <div class="placeholder">
        <p>Loading…</p>
      </div>
    </div>
  </main>

  <script>
    // Extract project from URL: /videos/<project-name>
    let project = null;
    const pathMatch = window.location.pathname.match(/^\/videos\/(.+?)\/?$/);
    if (pathMatch) project = decodeURIComponent(pathMatch[1]);

    const wrap = document.getElementById("videosWrap");
    const projectHeadline = document.getElementById("projectHeadline");

    if (!project) {
      wrap.innerHTML = '<div class="error-msg">No project specified. URL should be /videos/&lt;project-name&gt;.</div>';
    } else {
      window.me.applyProjectHeadline(project, projectHeadline);
      const enc = encodeURIComponent(project);
      // Default project-headline link to the no-IAP /public/ mirror so
      // anonymous viewers can follow it; editor IIFE below overrides.
      projectHeadline.href = `/public/${enc}`;
      document.querySelectorAll(".nav-map").forEach((a) => a.href = `/map-viewer/${enc}`);
      document.querySelectorAll(".nav-images").forEach((a) => a.href = `/images/${enc}`);
      document.querySelectorAll(".nav-plans").forEach((a) => a.href = `/plans/${enc}`);
      document.querySelectorAll(".nav-models").forEach((a) => a.href = `/models/${enc}`);
      document.querySelectorAll(".nav-pointclouds").forEach((a) => a.href = `/pointclouds/${enc}`);

      (async () => {
        const isEditor = window.me ? await window.me.canEdit(project) : false;
        if (window.me && await window.me.isAdmin()) {
          const a = document.getElementById("adminUploadLink");
          a.href = `/video-upload.html?project=${enc}`;
          a.style.display = "";
        }
        if (!isEditor) {
          const logo = document.querySelector(".site-header .logo");
          if (logo) logo.href = `/public/${enc}`;
        } else {
          document.body.classList.add("editor-nav");
          if (projectHeadline) projectHeadline.href = `/${enc}`;
          const isAdminUser = window.me ? !!(await window.me.isAdmin()) : false;
          const editProjectItem = isAdminUser
            ? `<a href="/edit-project.html?project=${enc}">Edit Project Information</a>`
            : "";
          const dd = document.querySelector("#menuDropdown .dropdown-inner");
          if (dd) {
            dd.innerHTML = `
              <a href="/map-viewer/${enc}">Map</a>
              <a href="/images/${enc}">2D Images</a>
              <a href="/plans/${enc}">2D Plans</a>
              <a href="/models/${enc}">Models</a>
              <a href="/documents/${enc}">Documents</a>
              <a href="/videos/${enc}">Videos</a>
              <a href="/users.html?project=${enc}">Users</a>
              ${editProjectItem}
              <a href="/${enc}">Project Home</a>
            `;
          }
        }
      })();

      loadVideos(project);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }
    function escapeAttr(s) { return escapeHtml(s); }
    function formatSize(bytes) {
      if (!bytes && bytes !== 0) return "—";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(2) + " MB";
      return (bytes / 1024 / 1024 / 1024).toFixed(2) + " GB";
    }
    function formatDate(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    const VIDEO_GLYPH_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>';

    async function loadVideos(project) {
      const isAdmin = !!(window.me && await window.me.isAdmin());
      // /api/video/files is admin-only. Rather than fire a request that's
      // guaranteed to 403, surface a friendly notice for non-admins.
      if (!isAdmin) {
        wrap.innerHTML = '<div class="not-admin">Videos are admin-only for this project.</div>';
        return;
      }
      try {
        const res = await fetch(`/api/video/files?project=${encodeURIComponent(project)}`, { credentials: "same-origin" });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`);
        const videos = await res.json();
        // Server already sorts uploadedAt desc, but re-sort defensively.
        videos.sort((a, b) => (b.uploadedAt || b.updated || "").localeCompare(a.uploadedAt || a.updated || ""));

        if (videos.length === 0) {
          wrap.innerHTML = '<div class="placeholder"><div class="placeholder-icon">&#127916;</div><p>No videos uploaded for this project yet.</p></div>';
          return;
        }

        const grid = document.createElement("div");
        grid.className = "videos-grid";

        videos.forEach((v) => {
          const card = document.createElement("div");
          card.className = "video-card";
          card.dataset.file = v.name;
          card.innerHTML = `
            <div class="video-card-thumb">${VIDEO_GLYPH_SVG}</div>
            <div class="video-card-body">
              <span class="video-card-name editable" contenteditable="true" spellcheck="false" title="${escapeAttr(v.displayName)}">${escapeHtml(v.displayName)}</span>
              <div class="video-card-meta">
                <span>${formatDate(v.uploadedAt || v.updated)}</span>
                <span>${formatSize(v.size)}</span>
                <span>${escapeHtml(v.uploadedBy || "—")}</span>
              </div>
              <div class="video-card-actions">
                <button type="button" class="btn btn-outline btn-sm download-btn">Download</button>
                <button type="button" class="btn btn-outline btn-sm btn-danger delete-btn">Delete</button>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });

        wrap.innerHTML = "";
        wrap.appendChild(grid);

        // Inline rename — commits via /api/video/rename on blur or Enter.
        grid.querySelectorAll(".video-card-name.editable").forEach((el) => {
          const original = el.textContent;
          el.dataset.original = original;
          el.addEventListener("keydown", (e) => {
            if (e.key === "Enter") { e.preventDefault(); el.blur(); }
            if (e.key === "Escape") { el.textContent = el.dataset.original; el.blur(); }
          });
          el.addEventListener("blur", async () => {
            const newName = el.textContent.trim();
            if (!newName || newName === el.dataset.original) {
              el.textContent = el.dataset.original;
              return;
            }
            const card = el.closest(".video-card");
            const filePath = card.dataset.file;
            try {
              const r = await fetch("/api/video/rename", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "same-origin",
                body: JSON.stringify({ file: filePath, newName }),
              });
              const data = await r.json().catch(() => ({}));
              if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
              loadVideos(project);
            } catch (err) {
              alert("Rename failed: " + err.message);
              el.textContent = el.dataset.original;
            }
          });
        });

        // Download — fetch a 15-min signed URL and follow it.
        grid.querySelectorAll(".download-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const card = btn.closest(".video-card");
            const filePath = card.dataset.file;
            btn.disabled = true; const orig = btn.textContent; btn.textContent = "…";
            try {
              const r = await fetch(`/api/video/download-url?file=${encodeURIComponent(filePath)}`, { credentials: "same-origin" });
              if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || `HTTP ${r.status}`);
              const { downloadUrl } = await r.json();
              window.location.href = downloadUrl;
            } catch (err) {
              alert("Download failed: " + err.message);
            } finally {
              btn.disabled = false; btn.textContent = orig;
            }
          });
        });

        grid.querySelectorAll(".delete-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const card = btn.closest(".video-card");
            const filePath = card.dataset.file;
            const displayName = card.querySelector(".video-card-name")?.textContent || filePath;
            if (!confirm(`Delete "${displayName}"? This cannot be undone.`)) return;
            btn.disabled = true; btn.textContent = "Deleting…";
            try {
              const r = await fetch("/api/video/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "same-origin",
                body: JSON.stringify({ file: filePath }),
              });
              if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || `HTTP ${r.status}`);
              loadVideos(project);
            } catch (err) {
              alert("Delete failed: " + err.message);
              btn.disabled = false; btn.textContent = "Delete";
            }
          });
        });
      } catch (err) {
        wrap.innerHTML = `<div class="error-msg">${escapeHtml(err.message)}</div>`;
      }
    }

    // Mobile hamburger menu — toggle, click-outside, Escape to close
    (function () {
      const btn = document.getElementById("menuBtn");
      const panel = document.getElementById("menuDropdown");
      if (!btn || !panel) return;
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const open = panel.classList.toggle("is-open");
        btn.setAttribute("aria-expanded", open);
      });
      document.addEventListener("click", (e) => {
        if (!e.target.closest("#menuDropdown") && !e.target.closest("#menuBtn")) {
          panel.classList.remove("is-open");
          btn.setAttribute("aria-expanded", "false");
        }
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          panel.classList.remove("is-open");
          btn.setAttribute("aria-expanded", "false");
        }
      });
    })();
  </script>
</body>
</html>
