<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Viewer — GT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.js"></script>
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app.css">
  <script src="/me.js"></script>
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }

    .project-headline {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    /* On narrow screens: stack the project name below the logo */
    @media (max-width: 640px) {
      .header-inner { flex-wrap: wrap; row-gap: 4px; }
      .project-headline {
        order: 3;
        flex-basis: 100%;
        font-size: 0.85rem;
        color: var(--ink-muted);
        padding-top: 4px;
        border-top: 1px solid var(--line);
      }
    }

    /* Map area — grows to natural image height so long maps scroll with the
       page. The level bar stays pinned below the header while you scroll. */
    .map-area {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      position: relative;
      overflow: auto;          /* scroll both axes when content (or zoom) exceeds viewport */
      background: var(--secondary-block);
      /* touch-action: pan-y lets the page scroll vertically with one finger,
         while our JS handlers take over pinch-zoom and drag-to-pan when the
         map is zoomed in. */
      touch-action: pan-y;
      -webkit-overflow-scrolling: touch;
    }
    .map-area.zoomed { cursor: grab; }
    .map-area.panning { cursor: grabbing; }

    .map-container {
      position: relative;
      display: inline-block;
      transform-origin: 0 0;
      will-change: transform;
    }
    .map-container img {
      /* Fit the floor plan inside the available viewport (minus header + level bar)
         by default so it is never larger than the screen on load. Users can then
         wheel/pinch to zoom in, and scrollbars appear if the zoomed image exceeds
         the viewport. */
      max-width: 100%;
      max-height: calc(100vh - var(--header-h) - 64px);
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
    }

    .placeholder { text-align: center; color: rgba(255,255,255,0.5); padding: var(--space-md); }
    .placeholder-icon { font-size: 2.5rem; margin-bottom: var(--space-sm); }
    .placeholder p { font-size: 0.9rem; margin: 0; }
    .placeholder a { color: var(--accent); }

    /* Pins */
    .pin {
      position: absolute;
      width: 13px;
      height: 13px;
      background: #ffffff;
      border: 2px solid var(--ink);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 5;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.4), 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .pin:hover {
      transform: translate(-50%, -50%) scale(1.3);
      box-shadow: 0 0 0 3px var(--accent), 0 2px 12px rgba(0,0,0,0.5);
    }
    .pin-tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: #fff;
      padding: 4px 8px;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      white-space: nowrap;
      pointer-events: none;
      display: none;
      z-index: 10;
    }
    .pin:hover .pin-tooltip { display: block; }

    /* Level bar — above the map, visually part of the map region.
       Sticks below the sticky header while the user scrolls through a tall map. */
    .level-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem var(--space-md);
      margin-top: 8px; /* small buffer between header and level selector */
      background: var(--secondary-block);
      flex-shrink: 0;
      position: sticky;
      top: var(--header-h);
      z-index: 20;
    }
    .level-bar label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
    }
    .level-bar select {
      padding: 0.25rem 0.5rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      outline: none;
      min-width: 120px;
      transition: border-color var(--transition), background var(--transition);
    }
    .level-bar select:hover { background: rgba(255, 255, 255, 0.14); }
    .level-bar select:focus { border-color: var(--accent); }
    .level-bar select option { background: var(--secondary-block); color: #fff; }

    /* Zoom indicator */
    .zoom-indicator {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(13, 13, 13, 0.75);
      color: #fff;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 50;
    }
    .zoom-indicator.visible { opacity: 1; }

    /* Fullscreen 360 modal */
    .viewer-modal {
      position: fixed;
      inset: 0;
      background: var(--ink);
      z-index: 1000;
      display: none;
    }
    .viewer-modal.visible { display: block; }
    #pano360 { width: 100%; height: 100%; }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      font-size: 1.25rem;
      cursor: pointer;
      z-index: 1010;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }
    .close-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    .modal-title {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #fff;
      font-size: 0.8125rem;
      letter-spacing: 0.04em;
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 12px;
      z-index: 1010;
      max-width: calc(100% - 100px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13,13,13,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1005;
      color: rgba(255,255,255,0.8);
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .loading-overlay.hidden { display: none; }

    @media (max-width: 600px) {
      .level-bar { padding: 0.5rem var(--space-sm); }
      .project-headline { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/">
        <img class="logo__mark" src="https://gt3d.com/images/logo-mark.svg" alt="" width="36" height="36" decoding="async">
        Ground Truth <span>3D</span>
      </a>
      <span class="project-headline" id="projectHeadline">Map Viewer</span>
      <div style="margin-left:auto; display:flex; align-items:center; gap:var(--space-sm);">
        <button class="menu-toggle" id="menuBtn" aria-label="Menu" aria-expanded="false">
          <span class="bar"></span>
        </button>
      </div>
    </div>
    <div class="dropdown-panel" id="menuDropdown">
      <div class="dropdown-inner">
        <!-- Non-editor menu (Models, Photos, GT3D Home) -->
        <a id="modelsMenuItem" href="/models/" class="non-editor-only">Models</a>
        <a id="photosMenuItem" href="/viewer.html" class="non-editor-only">Photos</a>
        <a href="https://gt3d.com" target="_blank" rel="noopener" class="non-editor-only">GT3D Home</a>

        <!-- Editor menu (Edit Map, 360 Photos, 2D Photos, Models, Projects) -->
        <a id="editMapMenuItem" href="/map-editor.html" class="editor-only" style="display:none;">Edit Map</a>
        <a id="viewerMenuItem" href="/viewer.html" class="editor-only" style="display:none;">360 Photos</a>
        <a id="imageViewerMenuItem" href="/image-viewer.html" class="editor-only" style="display:none;">2D Photos</a>
        <a id="modelsMenuItemEditor" href="/models/" class="editor-only" style="display:none;">Models</a>
        <a href="/" class="editor-only" style="display:none;">Projects</a>
      </div>
    </div>
  </header>

  <div class="level-bar">
    <label for="levelSelect">Level</label>
    <select id="levelSelect">
      <option value="">Loading…</option>
    </select>
  </div>

  <div class="map-area" id="mapArea">
    <div class="placeholder" id="mapPlaceholder">
      <div class="placeholder-icon">&#128506;</div>
      <p>Loading map…</p>
    </div>
    <div class="map-container" id="mapContainer" style="display:none;">
      <img id="floorPlanImg" alt="Floor plan">
    </div>
    <div class="zoom-indicator" id="zoomIndicator">100%</div>
  </div>

  <div class="viewer-modal" id="viewerModal">
    <div class="modal-title" id="modalTitle"></div>
    <button class="close-btn" id="closeBtn" title="Close">&times;</button>
    <div id="pano360"></div>
    <div class="loading-overlay" id="modalLoading">Loading 360…</div>
  </div>

  <script>
    let project = null;
    const pathMatch = window.location.pathname.match(/^\/map-viewer\/(.+?)\/?$/);
    if (pathMatch) project = decodeURIComponent(pathMatch[1]);
    else project = new URLSearchParams(window.location.search).get("project");

    const projectHeadline = document.getElementById("projectHeadline");
    const mapPlaceholder = document.getElementById("mapPlaceholder");
    const mapContainer = document.getElementById("mapContainer");
    const floorPlanImg = document.getElementById("floorPlanImg");
    const levelSelect = document.getElementById("levelSelect");
    const viewerModal = document.getElementById("viewerModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalLoading = document.getElementById("modalLoading");
    const closeBtn = document.getElementById("closeBtn");

    let mappings = { floorPlanImage: null, floorPlans: {}, pins: [] };
    function getFloorPlanForLevel(level) {
      if (level && mappings.floorPlans && mappings.floorPlans[level]) return mappings.floorPlans[level];
      return mappings.floorPlanImage || null;
    }
    let currentLevel = "level 1";
    let viewer = null;

    if (!project) {
      mapPlaceholder.innerHTML = '<div class="placeholder-icon">&#128679;</div><p>No project specified</p>';
    } else {
      projectHeadline.textContent = project;
      const enc = encodeURIComponent(project);
      // Non-editor menu items
      document.getElementById("modelsMenuItem").href = `/models/${enc}`;
      document.getElementById("photosMenuItem").href = `/viewer.html?project=${enc}`;
      // Editor menu items — href filled in now, visibility set after /api/me resolves
      document.getElementById("editMapMenuItem").href = `/map-editor.html?project=${enc}`;
      document.getElementById("viewerMenuItem").href = `/viewer.html?project=${enc}`;
      document.getElementById("imageViewerMenuItem").href = `/image-viewer.html?project=${enc}`;
      document.getElementById("modelsMenuItemEditor").href = `/models/${enc}`;

      // If the viewer can edit, swap to the editor menu: hide non-editor items,
      // reveal editor items.
      (async () => {
        if (window.me && await window.me.canEdit(project)) {
          document.querySelectorAll(".non-editor-only").forEach((el) => el.style.display = "none");
          document.querySelectorAll(".editor-only").forEach((el) => el.style.display = "");
        }
      })();

      init();
    }

    // Menu toggle
    const menuBtn = document.getElementById("menuBtn");
    const menuDropdown = document.getElementById("menuDropdown");
    menuBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      const open = menuDropdown.classList.toggle("is-open");
      menuBtn.setAttribute("aria-expanded", open);
    });
    document.addEventListener("click", (e) => {
      if (!e.target.closest("#menuDropdown") && !e.target.closest("#menuBtn")) {
        menuDropdown.classList.remove("is-open");
        menuBtn.setAttribute("aria-expanded", "false");
      }
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        menuDropdown.classList.remove("is-open");
        menuBtn.setAttribute("aria-expanded", "false");
      }
    });

    async function init() {
      await Promise.all([loadLevels(), loadMappings()]);
      refreshFloorPlanDisplay();
    }

    function refreshFloorPlanDisplay() {
      const path = getFloorPlanForLevel(currentLevel);
      if (path) { showFloorPlan(path); }
      else {
        mapContainer.style.display = "none";
        mapPlaceholder.style.display = "";
        mapPlaceholder.innerHTML = `<div class="placeholder-icon">&#128506;</div><p>No floor plan set for <strong>${currentLevel || "this level"}</strong>.<br><a href="/map-editor.html?project=${encodeURIComponent(project)}">Open Map Editor</a> to configure.</p>`;
      }
    }

    async function loadLevels() {
      try {
        const res = await fetch(`/api/levels?project=${encodeURIComponent(project)}`);
        if (!res.ok) return;
        const levels = await res.json();
        levelSelect.innerHTML = "";
        if (levels.length === 0) { levelSelect.innerHTML = '<option value="">No levels</option>'; return; }
        levels.forEach((lvl) => {
          const opt = document.createElement("option"); opt.value = lvl; opt.textContent = lvl; levelSelect.appendChild(opt);
        });
        const defaultLevel = levels.includes("level 1") ? "level 1" : levels[0];
        currentLevel = defaultLevel;
        levelSelect.value = defaultLevel;
      } catch {}
    }

    async function loadMappings() {
      try {
        const res = await fetch(`/api/mappings?project=${encodeURIComponent(project)}`);
        if (!res.ok) return;
        mappings = await res.json();
      } catch {}
    }

    function showFloorPlan(imagePath) {
      floorPlanImg.src = `/api/2d/image?file=${encodeURIComponent(imagePath)}`;
      floorPlanImg.onload = () => {
        mapPlaceholder.style.display = "none";
        mapContainer.style.display = "inline-block";
        renderPins();
      };
      floorPlanImg.onerror = () => {
        mapPlaceholder.innerHTML = '<div class="placeholder-icon">&#128247;</div><p style="color:#ff8a7a">Failed to load floor plan</p>';
      };
    }

    function renderPins() {
      mapContainer.querySelectorAll(".pin").forEach((el) => el.remove());
      const prefix = `${project}/${currentLevel}/`;
      const visiblePins = mappings.pins.filter((p) => p.image360.startsWith(prefix));
      visiblePins.forEach((pin) => {
        const el = document.createElement("div");
        el.className = "pin";
        el.style.left = (pin.x * 100) + "%";
        el.style.top = (pin.y * 100) + "%";
        const displayName = pin.image360.split("/").pop();
        el.innerHTML = `<div class="pin-tooltip">${displayName}</div>`;
        el.addEventListener("click", (e) => { e.stopPropagation(); openViewer(pin.image360, displayName); });
        mapContainer.appendChild(el);
      });
    }

    levelSelect.addEventListener("change", () => {
      currentLevel = levelSelect.value;
      resetZoom();
      refreshFloorPlanDisplay();
    });

    // ---- Zoom + pan ----
    const mapArea = document.getElementById("mapArea");
    const zoomIndicator = document.getElementById("zoomIndicator");
    let scale = 1, tx = 0, ty = 0;
    const MIN_SCALE = 1, MAX_SCALE = 8;
    let zoomIndicatorTimer = null;

    function applyTransform() {
      mapContainer.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
      mapArea.classList.toggle("zoomed", scale > 1);
    }
    function resetZoom() { scale = 1; tx = 0; ty = 0; applyTransform(); }
    function showZoomIndicator() {
      zoomIndicator.textContent = Math.round(scale * 100) + "%";
      zoomIndicator.classList.add("visible");
      clearTimeout(zoomIndicatorTimer);
      zoomIndicatorTimer = setTimeout(() => zoomIndicator.classList.remove("visible"), 1000);
    }

    mapArea.addEventListener("wheel", (e) => {
      if (mapContainer.style.display === "none") return;
      e.preventDefault();
      const rect = mapContainer.getBoundingClientRect();
      const px = (e.clientX - rect.left) / scale;
      const py = (e.clientY - rect.top) / scale;
      const factor = Math.exp(-e.deltaY * 0.0015);
      const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * factor));
      tx += px * (scale - newScale);
      ty += py * (scale - newScale);
      scale = newScale;
      if (scale === 1) { tx = 0; ty = 0; }
      applyTransform();
      showZoomIndicator();
    }, { passive: false });

    let panning = false, panStartX = 0, panStartY = 0, panStartTx = 0, panStartTy = 0;
    mapArea.addEventListener("mousedown", (e) => {
      if (scale <= 1) return;
      if (e.target.closest(".pin") || e.target.closest(".site-header")) return;
      panning = true; panStartX = e.clientX; panStartY = e.clientY; panStartTx = tx; panStartTy = ty;
      mapArea.classList.add("panning"); e.preventDefault();
    });
    document.addEventListener("mousemove", (e) => {
      if (!panning) return;
      tx = panStartTx + (e.clientX - panStartX);
      ty = panStartTy + (e.clientY - panStartY);
      applyTransform();
    });
    document.addEventListener("mouseup", () => { if (!panning) return; panning = false; mapArea.classList.remove("panning"); });
    mapArea.addEventListener("dblclick", (e) => { if (e.target.closest(".pin")) return; resetZoom(); showZoomIndicator(); });

    // ---- Touch: pinch-zoom + one-finger pan + tap-to-open-pin ----
    let touchMode = null; // 'pan' | 'pinch' | null
    let touchStartX = 0, touchStartY = 0, touchStartTx = 0, touchStartTy = 0;
    let pinchStartDist = 0, pinchStartScale = 1, pinchAnchorPx = 0, pinchAnchorPy = 0;
    let lastTapAt = 0, tapTarget = null;

    function touchDistance(t1, t2) {
      const dx = t2.clientX - t1.clientX;
      const dy = t2.clientY - t1.clientY;
      return Math.hypot(dx, dy);
    }
    function touchMidpoint(t1, t2) {
      return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
    }

    mapArea.addEventListener("touchstart", (e) => {
      if (mapContainer.style.display === "none") return;
      // Pins use a tap fallback because tapping a pin triggers this listener first
      if (e.touches.length === 1) {
        const t = e.touches[0];
        if (e.target.closest(".pin")) {
          tapTarget = e.target.closest(".pin");
          return; // don't treat as pan — let click/touchend open the viewer
        }
        if (scale <= 1) return; // nothing to pan if not zoomed
        touchMode = "pan";
        touchStartX = t.clientX; touchStartY = t.clientY;
        touchStartTx = tx; touchStartTy = ty;
        e.preventDefault();
      } else if (e.touches.length === 2) {
        touchMode = "pinch";
        const [a, b] = e.touches;
        pinchStartDist = touchDistance(a, b);
        pinchStartScale = scale;
        const mid = touchMidpoint(a, b);
        const rect = mapContainer.getBoundingClientRect();
        // Anchor point in the untransformed map coords
        pinchAnchorPx = (mid.x - rect.left) / scale;
        pinchAnchorPy = (mid.y - rect.top) / scale;
        e.preventDefault();
      }
    }, { passive: false });

    mapArea.addEventListener("touchmove", (e) => {
      if (touchMode === "pan" && e.touches.length === 1) {
        const t = e.touches[0];
        tx = touchStartTx + (t.clientX - touchStartX);
        ty = touchStartTy + (t.clientY - touchStartY);
        applyTransform();
        e.preventDefault();
      } else if (touchMode === "pinch" && e.touches.length === 2) {
        const [a, b] = e.touches;
        const dist = touchDistance(a, b);
        const rawScale = pinchStartScale * (dist / pinchStartDist);
        const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, rawScale));
        const mid = touchMidpoint(a, b);
        const rect = mapArea.getBoundingClientRect();
        // Keep the pinch midpoint stationary relative to the content
        tx = mid.x - rect.left - pinchAnchorPx * newScale;
        ty = mid.y - rect.top - pinchAnchorPy * newScale;
        scale = newScale;
        if (scale === 1) { tx = 0; ty = 0; }
        applyTransform();
        showZoomIndicator();
        e.preventDefault();
      }
    }, { passive: false });

    mapArea.addEventListener("touchend", (e) => {
      // Tap on a pin → open viewer (touchstart stashed it in tapTarget)
      if (tapTarget && e.changedTouches.length === 1 && e.touches.length === 0) {
        const pinId = tapTarget;
        tapTarget = null;
        // Synthesize a click so the existing handler fires
        const clickEvt = new MouseEvent("click", { bubbles: true, cancelable: true });
        pinId.dispatchEvent(clickEvt);
      }
      if (e.touches.length === 0) touchMode = null;
      // When dropping from 2 to 1 finger, end pinch but keep single-touch still idle
      else if (e.touches.length === 1 && touchMode === "pinch") touchMode = null;
    }, { passive: true });

    function openViewer(image360, displayName) {
      modalTitle.textContent = displayName;
      viewerModal.classList.add("visible");
      modalLoading.classList.remove("hidden");
      if (viewer) { try { viewer.destroy(); } catch {} viewer = null; }
      viewer = pannellum.viewer("pano360", {
        type: "equirectangular",
        panorama: `/api/image?file=${encodeURIComponent(image360)}`,
        autoLoad: true, compass: true, showControls: true, mouseZoom: true, autoRotate: -2,
        loadedCallback: () => modalLoading.classList.add("hidden"),
      });
      setTimeout(() => modalLoading.classList.add("hidden"), 8000);
    }
    function closeViewer() {
      viewerModal.classList.remove("visible");
      if (viewer) { try { viewer.destroy(); } catch {} viewer = null; }
    }
    closeBtn.addEventListener("click", closeViewer);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && viewerModal.classList.contains("visible")) closeViewer();
    });
  </script>
</body>
</html>
