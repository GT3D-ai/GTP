<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — GT Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app.css">
  <script src="/me.js"></script>
  <style>
    .page-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
      flex-wrap: wrap;
    }
    .page-head h1 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(1.5rem, 3vw, 2rem);
      letter-spacing: -0.02em;
      margin: 0;
      word-break: break-word;
    }
    .page-head-meta {
      color: var(--ink-muted);
      font-size: 0.9rem;
    }

    /* Grid */
    .home-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
    }
    @media (min-width: 720px) { .home-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1100px) { .home-grid { grid-template-columns: repeat(2, 1fr); } }

    /* Generic card */
    .home-card {
      background: var(--bg-elevated);
      display: flex;
      flex-direction: column;
    }
    .home-card-thumb {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      display: block;
      background: linear-gradient(145deg, #e8e4dd 0%, #d4cfc3 100%);
      border-bottom: 1px solid var(--line);
      color: var(--ink-subtle);
      font-size: 3rem;
    }
    .home-card-thumb.is-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .home-card-thumb.is-placeholder::after {
      content: "";
      position: absolute;
      inset: 15%;
      border: 1px solid rgba(13, 13, 13, 0.12);
      transform: rotate(3deg);
    }
    .home-card-thumb.is-placeholder::before {
      content: "";
      position: absolute;
      inset: 22%;
      border: 1px solid rgba(13, 13, 13, 0.08);
      transform: rotate(-4deg);
    }
    .home-card-thumb .glyph { position: relative; z-index: 1; }

    /* Pin overlay used on the map card thumbnail */
    .map-thumb-stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .map-thumb-stage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .map-thumb-pin {
      position: absolute;
      width: 9px;
      height: 9px;
      background: #ffffff;
      border: 1.5px solid #0d0d0d;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 1.5px rgba(255,255,255,0.5), 0 1px 4px rgba(0,0,0,0.35);
      pointer-events: none;
    }

    .home-card-body {
      padding: var(--space-md);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .home-card-eyebrow {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-subtle);
    }
    .home-card-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.0625rem;
      letter-spacing: -0.01em;
      color: var(--ink);
      word-break: break-word;
    }
    .home-card-meta {
      font-size: 0.8125rem;
      color: var(--ink-muted);
      line-height: 1.5;
    }
    .home-card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem var(--space-md);
      margin-top: auto;
      padding-top: var(--space-sm);
    }
    .home-card-actions a {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink-muted);
    }
    .home-card-actions a:hover { color: var(--accent); }
    .home-card-actions a.primary { color: var(--accent); }

    /* Main card spans both columns on wider layouts */
    @media (min-width: 720px) {
      .home-card.main { grid-column: 1 / -1; }
      .home-card.main { flex-direction: row; }
      .home-card.main .home-card-thumb {
        width: 40%;
        aspect-ratio: auto;
        height: auto;
        min-height: 200px;
        flex-shrink: 0;
        border-bottom: none;
        border-right: 1px solid var(--line);
      }
      .home-card.main .home-card-body { flex: 1; }
    }

    /* Level selector on the map card */
    .map-card-level-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2px;
    }
    .map-card-level-row label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .map-card-level-row select {
      flex: 1;
      min-width: 0;
      padding: 0.4rem 0.6rem;
      background: var(--bg-elevated);
      border: 1px solid var(--line-strong);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 0.8125rem;
      outline: none;
      cursor: pointer;
    }
    .map-card-level-row select:focus { border-color: var(--ink); }

    /* Make the tile clickable for simple cards */
    .home-card-link { text-decoration: none; color: inherit; display: contents; }

    .error-msg { color: var(--danger); padding: var(--space-md); background: var(--danger-bg); border: 1px solid var(--danger); }
    .skeleton { color: var(--ink-subtle); font-style: italic; font-size: 0.875rem; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/">
        <img class="logo__mark" src="https://gt3d.com/images/logo-mark.svg" alt="" width="36" height="36" decoding="async">
        Ground Truth <span>3D</span>
      </a>
      <nav class="nav-primary" aria-label="Primary">
        <a id="mapLink" href="#">Map</a>
        <a id="imagesLink" href="#">2D Images</a>
        <a id="plansLink" href="#">2D Plans</a>
        <a id="modelsLink" href="#">3D Models</a>
        <a href="https://gt3d.com" target="_blank" rel="noopener">GT3D Home</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="page-head">
      <h1 id="projectName">Loading…</h1>
      <div class="page-head-meta" id="projectAddress"></div>
    </div>

    <div id="homeWrap">
      <div class="home-grid" id="homeGrid">
        <!-- MAIN: project cover + address + top-level links -->
        <div class="home-card main" id="mainCard">
          <div class="home-card-thumb is-placeholder" id="mainCardThumb"><span class="glyph">&#128194;</span></div>
          <div class="home-card-body">
            <div class="home-card-eyebrow">Project</div>
            <div class="home-card-title" id="mainCardTitle">—</div>
            <div class="home-card-meta" id="mainCardAddress"></div>
            <div class="home-card-actions">
              <a href="#" class="primary" id="mainMapLink">Map</a>
              <a href="#" id="mainImagesLink">2D Images</a>
              <a href="#" id="mainPlansLink">2D Plans</a>
              <a href="#" id="mainModelsLink">3D Models</a>
            </div>
          </div>
        </div>

        <!-- MAP: Level 1 floor plan thumbnail + level selector -->
        <div class="home-card" id="mapCard">
          <a id="mapThumbLink" href="#" aria-label="Open map">
            <div class="home-card-thumb is-placeholder" id="mapCardThumb"><span class="glyph">&#128506;</span></div>
          </a>
          <div class="home-card-body">
            <div class="home-card-eyebrow">Map</div>
            <div class="home-card-title" id="mapCardTitle">Project map</div>
            <div class="map-card-level-row">
              <label for="mapLevelSelect">Level</label>
              <select id="mapLevelSelect"><option value="">Loading…</option></select>
            </div>
            <div class="home-card-actions">
              <a href="#" class="primary" id="mapCardOpen">Open map</a>
            </div>
          </div>
        </div>

        <!-- 2D IMAGE: most recent -->
        <div class="home-card" id="imageCard">
          <a id="imageThumbLink" href="#" aria-label="Open 2D images">
            <div class="home-card-thumb is-placeholder" id="imageCardThumb"><span class="glyph">&#128444;</span></div>
          </a>
          <div class="home-card-body">
            <div class="home-card-eyebrow">Most recent 2D image</div>
            <div class="home-card-title" id="imageCardTitle">—</div>
            <div class="home-card-meta" id="imageCardMeta"></div>
            <div class="home-card-actions">
              <a href="#" class="primary" id="imageCardOpen">View 2D Images</a>
            </div>
          </div>
        </div>

        <!-- 2D PLAN: most recent -->
        <div class="home-card" id="planCard">
          <a id="planThumbLink" href="#" aria-label="Open plans">
            <div class="home-card-thumb is-placeholder" id="planCardThumb"><span class="glyph">&#128196;</span></div>
          </a>
          <div class="home-card-body">
            <div class="home-card-eyebrow">Most recent plan</div>
            <div class="home-card-title" id="planCardTitle">—</div>
            <div class="home-card-meta" id="planCardMeta"></div>
            <div class="home-card-actions">
              <a href="#" class="primary" id="planCardOpen">View 2D Plans</a>
            </div>
          </div>
        </div>

        <!-- 3D MODEL: most recent -->
        <div class="home-card" id="modelCard">
          <a id="modelThumbLink" href="#" aria-label="Open models">
            <div class="home-card-thumb is-placeholder" id="modelCardThumb"><span class="glyph">&#127744;</span></div>
          </a>
          <div class="home-card-body">
            <div class="home-card-eyebrow">Most recent model</div>
            <div class="home-card-title" id="modelCardTitle">—</div>
            <div class="home-card-meta" id="modelCardMeta"></div>
            <div class="home-card-actions">
              <a href="#" class="primary" id="modelCardOpen">View 3D Models</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // The URL is /<project-name>; decode whatever comes after the first slash.
    const projectRaw = decodeURIComponent(window.location.pathname.replace(/^\//, "").split("/")[0]);
    const project = projectRaw || "";

    if (!project) {
      document.getElementById("homeWrap").innerHTML = '<div class="error-msg">No project specified in URL.</div>';
    } else {
      initPage();
    }

    function formatSize(bytes) {
      if (bytes == null) return "";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(2) + " MB";
      return (bytes / 1024 / 1024 / 1024).toFixed(2) + " GB";
    }
    function formatDate(iso) {
      if (!iso) return "";
      return new Date(iso).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    async function initPage() {
      const enc = encodeURIComponent(project);

      // Title + header nav
      document.title = `${project} — GT Platform`;
      document.getElementById("projectName").textContent = project;
      document.getElementById("mapLink").href = `/map-viewer/${enc}`;
      document.getElementById("imagesLink").href = `/images/${enc}`;
      document.getElementById("plansLink").href = `/plans/${enc}`;
      document.getElementById("modelsLink").href = `/models/${enc}`;

      // Main card links
      document.getElementById("mainMapLink").href = `/map-viewer/${enc}`;
      document.getElementById("mainImagesLink").href = `/images/${enc}`;
      document.getElementById("mainPlansLink").href = `/plans/${enc}`;
      document.getElementById("mainModelsLink").href = `/models/${enc}`;

      // Map card links (default open map; level param updated later)
      document.getElementById("mapThumbLink").href = `/map-viewer/${enc}`;
      document.getElementById("mapCardOpen").href = `/map-viewer/${enc}`;

      // Plan / Model / Image card link targets
      document.getElementById("planThumbLink").href = `/plans/${enc}`;
      document.getElementById("planCardOpen").href = `/plans/${enc}`;
      document.getElementById("modelThumbLink").href = `/models/${enc}`;
      document.getElementById("modelCardOpen").href = `/models/${enc}`;
      document.getElementById("imageThumbLink").href = `/images/${enc}`;
      document.getElementById("imageCardOpen").href = `/images/${enc}`;

      // Kick off all loads in parallel
      await Promise.all([
        loadProjectInfo(),
        loadMapCard(),
        loadImageCard(),
        loadPlanCard(),
        loadModelCard(),
      ]);
    }

    // ---- Main card: cover + address ----
    async function loadProjectInfo() {
      try {
        const res = await fetch(`/api/project-info?project=${encodeURIComponent(project)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const info = await res.json();
        document.getElementById("mainCardTitle").textContent = info.name || project;

        const address = info.address || "";
        const addrEl = document.getElementById("mainCardAddress");
        const headerAddrEl = document.getElementById("projectAddress");
        if (address) {
          addrEl.textContent = address;
          headerAddrEl.textContent = address;
        } else {
          addrEl.innerHTML = '<span class="skeleton">No address set</span>';
        }

        if (info.coverPhoto) {
          const thumb = document.getElementById("mainCardThumb");
          thumb.classList.remove("is-placeholder");
          thumb.innerHTML = "";
          const img = document.createElement("img");
          img.src = `/api/2d/image?file=${encodeURIComponent(info.coverPhoto)}`;
          img.alt = info.name || project;
          img.loading = "lazy";
          img.style.width = "100%";
          img.style.height = "100%";
          img.style.objectFit = "cover";
          img.onerror = () => {
            thumb.classList.add("is-placeholder");
            thumb.innerHTML = '<span class="glyph">&#128194;</span>';
          };
          thumb.appendChild(img);
        }
      } catch (err) {
        document.getElementById("mainCardAddress").innerHTML =
          `<span class="error-msg" style="display:inline-block; padding:6px 8px;">${err.message}</span>`;
      }
    }

    // ---- Map card: level 1 floor plan + level selector ----
    let mappings = { floorPlanImage: null, floorPlans: {}, pins: [] };
    function getFloorPlanForLevel(level) {
      if (level && mappings.floorPlans && mappings.floorPlans[level]) return mappings.floorPlans[level];
      return mappings.floorPlanImage || null;
    }

    async function loadMapCard() {
      try {
        const [levelsRes, mapRes] = await Promise.all([
          fetch(`/api/levels?project=${encodeURIComponent(project)}`),
          fetch(`/api/mappings?project=${encodeURIComponent(project)}`),
        ]);
        const levels = levelsRes.ok ? await levelsRes.json() : [];
        mappings = mapRes.ok ? await mapRes.json() : mappings;

        const levelSelect = document.getElementById("mapLevelSelect");
        levelSelect.innerHTML = "";
        if (levels.length === 0) {
          levelSelect.innerHTML = '<option value="">No levels</option>';
        } else {
          levels.forEach((lvl) => {
            const opt = document.createElement("option");
            opt.value = lvl;
            opt.textContent = lvl;
            levelSelect.appendChild(opt);
          });
          // Prefer "level 1" (case-insensitive); fall back to first level
          const l1 = levels.find((l) => l.toLowerCase() === "level 1");
          const initial = l1 || levels[0];
          levelSelect.value = initial;
          renderMapThumb(initial);
        }

        levelSelect.addEventListener("change", () => {
          renderMapThumb(levelSelect.value);
        });
      } catch (err) {
        document.getElementById("mapCardTitle").innerHTML =
          `<span class="error-msg" style="display:inline-block; padding:6px 8px;">${err.message}</span>`;
      }
    }

    function renderMapThumb(level) {
      const enc = encodeURIComponent(project);
      const path = getFloorPlanForLevel(level);
      const thumb = document.getElementById("mapCardThumb");
      const titleEl = document.getElementById("mapCardTitle");
      titleEl.textContent = level ? `Project map — ${level}` : "Project map";
      // Update map links with level
      const mapTarget = level
        ? `/map-viewer/${enc}?level=${encodeURIComponent(level)}`
        : `/map-viewer/${enc}`;
      document.getElementById("mapThumbLink").href = mapTarget;
      document.getElementById("mapCardOpen").href = mapTarget;

      thumb.innerHTML = "";
      if (path) {
        thumb.classList.remove("is-placeholder");
        const stage = document.createElement("div");
        stage.className = "map-thumb-stage";
        const img = document.createElement("img");
        img.src = `/api/2d/image?file=${encodeURIComponent(path)}`;
        img.alt = `Floor plan — ${level}`;
        img.loading = "lazy";
        img.onerror = () => {
          thumb.classList.add("is-placeholder");
          thumb.innerHTML = '<span class="glyph">&#128506;</span>';
        };
        stage.appendChild(img);

        // Overlay pins for the selected level — same 360 photo markers
        // that the map viewer shows, rendered as small circles on top of
        // the floor plan thumbnail.
        const prefix = `${project}/${level}/`;
        const pins = (mappings.pins || []).filter((p) => p.image360 && p.image360.startsWith(prefix));
        pins.forEach((pin) => {
          const dot = document.createElement("div");
          dot.className = "map-thumb-pin";
          dot.style.left = (pin.x * 100) + "%";
          dot.style.top = (pin.y * 100) + "%";
          stage.appendChild(dot);
        });

        thumb.appendChild(stage);
      } else {
        thumb.classList.add("is-placeholder");
        thumb.innerHTML = '<span class="glyph">&#128506;</span>';
      }
    }

    // ---- Plan card: most recently uploaded 2D plan ----
    async function loadPlanCard() {
      try {
        const res = await fetch(`/api/plan/files?project=${encodeURIComponent(project)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const files = await res.json();
        if (files.length === 0) {
          document.getElementById("planCardTitle").textContent = "No plans yet";
          document.getElementById("planCardMeta").innerHTML = '<span class="skeleton">Uploaded plans will appear here.</span>';
          return;
        }
        files.sort((a, b) => (b.updated || "").localeCompare(a.updated || ""));
        const latest = files[0];
        document.getElementById("planCardTitle").textContent = latest.displayName;
        document.getElementById("planCardMeta").textContent =
          `${formatDate(latest.updated)} · ${formatSize(latest.size)}`;
        if (latest.thumbnail) {
          const thumb = document.getElementById("planCardThumb");
          thumb.classList.remove("is-placeholder");
          thumb.innerHTML = "";
          const img = document.createElement("img");
          img.src = `/api/plan/thumbnail?file=${encodeURIComponent(latest.thumbnail)}`;
          img.alt = latest.displayName;
          img.loading = "lazy";
          img.style.width = "100%";
          img.style.height = "100%";
          img.style.objectFit = "cover";
          img.onerror = () => {
            thumb.classList.add("is-placeholder");
            thumb.innerHTML = '<span class="glyph">&#128196;</span>';
          };
          thumb.appendChild(img);
        }
      } catch (err) {
        document.getElementById("planCardMeta").innerHTML =
          `<span class="error-msg" style="display:inline-block; padding:6px 8px;">${err.message}</span>`;
      }
    }

    // ---- 2D Image card: most recently uploaded image ----
    async function loadImageCard() {
      try {
        const res = await fetch(`/api/2d/files?project=${encodeURIComponent(project)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const files = await res.json();
        if (files.length === 0) {
          document.getElementById("imageCardTitle").textContent = "No 2D images yet";
          document.getElementById("imageCardMeta").innerHTML = '<span class="skeleton">Uploaded images will appear here.</span>';
          return;
        }
        files.sort((a, b) => (b.updated || "").localeCompare(a.updated || ""));
        const latest = files[0];
        document.getElementById("imageCardTitle").textContent = latest.displayName;
        document.getElementById("imageCardMeta").textContent =
          `${formatDate(latest.updated)} · ${formatSize(latest.size)}`;
        const thumb = document.getElementById("imageCardThumb");
        thumb.classList.remove("is-placeholder");
        thumb.innerHTML = "";
        const img = document.createElement("img");
        img.src = `/api/2d/image?file=${encodeURIComponent(latest.name)}`;
        img.alt = latest.displayName;
        img.loading = "lazy";
        img.style.width = "100%";
        img.style.height = "100%";
        img.style.objectFit = "cover";
        img.onerror = () => {
          thumb.classList.add("is-placeholder");
          thumb.innerHTML = '<span class="glyph">&#128444;</span>';
        };
        thumb.appendChild(img);
      } catch (err) {
        document.getElementById("imageCardMeta").innerHTML =
          `<span class="error-msg" style="display:inline-block; padding:6px 8px;">${err.message}</span>`;
      }
    }

    // ---- Model card: most recently uploaded 3D model ----
    async function loadModelCard() {
      try {
        const res = await fetch(`/api/model/files?project=${encodeURIComponent(project)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const files = await res.json();
        if (files.length === 0) {
          document.getElementById("modelCardTitle").textContent = "No models yet";
          document.getElementById("modelCardMeta").innerHTML = '<span class="skeleton">Uploaded models will appear here.</span>';
          return;
        }
        files.sort((a, b) => (b.updated || "").localeCompare(a.updated || ""));
        const latest = files[0];
        document.getElementById("modelCardTitle").textContent = latest.displayName;
        document.getElementById("modelCardMeta").textContent =
          `${formatDate(latest.updated)} · ${formatSize(latest.size)}`;
        if (latest.thumbnail) {
          const thumb = document.getElementById("modelCardThumb");
          thumb.classList.remove("is-placeholder");
          thumb.innerHTML = "";
          const img = document.createElement("img");
          img.src = `/api/model/thumbnail?file=${encodeURIComponent(latest.thumbnail)}`;
          img.alt = latest.displayName;
          img.loading = "lazy";
          img.style.width = "100%";
          img.style.height = "100%";
          img.style.objectFit = "cover";
          img.onerror = () => {
            thumb.classList.add("is-placeholder");
            thumb.innerHTML = '<span class="glyph">&#127744;</span>';
          };
          thumb.appendChild(img);
        }
      } catch (err) {
        document.getElementById("modelCardMeta").innerHTML =
          `<span class="error-msg" style="display:inline-block; padding:6px 8px;">${err.message}</span>`;
      }
    }
  </script>
</body>
</html>
